<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-title" content="MouseStream">

  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js';
  s.crossOrigin='anonymous';
  s.onerror=function(){window.Hls={isSupported:function(){return false;},Events:{},ErrorTypes:{}};};
  document.head.appendChild(s);
  // Cast SDK — Chrome desktop apenas
  var ua=navigator.userAgent;
  var isChrome=/Chrome\//.test(ua)&&!/Chromium|Edg\/|OPR\/|SamsungBrowser/.test(ua);
  if(isChrome&&!/iPhone|iPad|iPod/.test(ua)){
    var c=document.createElement('script');
    c.src='https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1';
    c.onerror=function(){console.warn('[MouseStream] Cast SDK indisponível.');};
    document.head.appendChild(c);
  }
  // Fonts
  var l=document.createElement('link');l.rel='stylesheet';
  l.href='https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap';
  document.head.appendChild(l);
})();
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080c10;--s1:#0f1318;--s2:#161b22;--s3:#1e2530;
  --acc:#00c2ff;--acc2:#0077ff;--red:#ff3b5c;
  --txt:#e8edf2;--mut:#5a6478;--brd:#1e2530;
  --green:#22c55e;--orange:#f59e0b;
  --sidebar:220px;--header:56px;
}
body{background:var(--bg);color:var(--txt);font-family:'Outfit',ui-sans-serif,system-ui,sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}

/* ══ SKELETON ══ */
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
.sk{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:600px 100%;animation:shimmer 1.5s infinite linear;border-radius:6px}
.sk-row{height:60px;border-radius:10px;margin-bottom:6px}
.sk-card{aspect-ratio:2/3;border-radius:9px}
.sk-line{height:12px;margin-bottom:6px;border-radius:4px}
.sk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:14px}

/* ══ LOGIN — cinematográfico ══ */
#sc-login{display:flex;align-items:center;justify-content:center;min-height:100vh;position:relative;overflow:hidden;background:#07080a}
#sc-login::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(0,194,255,.06) 0%,transparent 60%),radial-gradient(ellipse 40% 40% at 20% 80%,rgba(0,80,160,.08) 0%,transparent 50%),radial-gradient(ellipse 30% 30% at 80% 70%,rgba(0,40,80,.06) 0%,transparent 50%);pointer-events:none}
#sc-login::after{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 5px,rgba(255,255,255,.018) 5px,rgba(255,255,255,.018) 6px);pointer-events:none}
.film-l,.film-r{position:absolute;top:0;bottom:0;width:40px;pointer-events:none;opacity:.18}
.film-l{left:0;background:repeating-linear-gradient(180deg,#111 0px,#111 28px,#000 28px,#000 34px,#111 34px,#111 62px,#000 62px,#000 68px);border-right:2px solid #222}
.film-r{right:0;background:repeating-linear-gradient(180deg,#111 0px,#111 28px,#000 28px,#000 34px,#111 34px,#111 62px,#000 62px,#000 68px);border-left:2px solid #222}
.proj-ray{position:absolute;top:0;left:50%;transform:translateX(-50%);width:300px;height:60%;background:linear-gradient(180deg,rgba(255,250,230,.025) 0%,transparent 100%);clip-path:polygon(35% 0%,65% 0%,100% 100%,0% 100%);pointer-events:none}
@keyframes dust{0%{transform:translateY(0) translateX(0);opacity:0}10%{opacity:1}90%{opacity:.5}100%{transform:translateY(-80vh) translateX(20px);opacity:0}}
.dust{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;pointer-events:none}
.dust:nth-child(1){left:48%;animation:dust 8s 0s infinite linear;opacity:.3}
.dust:nth-child(2){left:52%;animation:dust 11s 2s infinite linear;opacity:.2;width:1px;height:1px}
.dust:nth-child(3){left:50%;animation:dust 9s 4s infinite linear;opacity:.25}
.dust:nth-child(4){left:46%;animation:dust 13s 1s infinite linear;opacity:.15;width:1px;height:1px}
.dust:nth-child(5){left:54%;animation:dust 10s 6s infinite linear;opacity:.2}
.login-wrap{width:100%;max-width:400px;padding:0 20px;position:relative;z-index:1}
.login-logo{font-size:38px;font-weight:800;letter-spacing:-1px;margin-bottom:2px;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 18px rgba(0,194,255,.25))}
.login-sub{font-size:11px;color:var(--mut);letter-spacing:2px;text-transform:uppercase;margin-bottom:28px}
/* Tab switch login */
.tab-sw{display:flex;background:rgba(15,19,24,.8);border:1px solid var(--brd);border-radius:10px;padding:4px;gap:4px;margin-bottom:20px}
.tab-sw-btn{flex:1;padding:8px;border:none;border-radius:7px;background:none;color:var(--mut);font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s}
.tab-sw-btn.on{background:var(--s3);color:var(--txt);box-shadow:0 1px 3px rgba(0,0,0,.5)}
.card{background:rgba(15,19,24,.95);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:28px;box-shadow:0 24px 60px rgba(0,0,0,.6)}
.lbl{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;display:block}
.inp{width:100%;background:var(--s2);border:1px solid var(--brd);border-radius:8px;padding:10px 14px;color:var(--txt);font-family:'Outfit',sans-serif;font-size:14px;outline:none;margin-bottom:12px;transition:border-color .15s}
.inp:focus{border-color:var(--acc)}
.inp::placeholder{color:var(--mut)}
.pwd-w{position:relative}
.pwd-w .inp{padding-right:42px;margin-bottom:12px}
.eye{position:absolute;right:12px;top:13px;background:none;border:none;color:var(--mut);cursor:pointer;font-size:16px;padding:0;line-height:1}
.eye:hover{color:var(--txt)}
.btn-conn{width:100%;background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:8px;padding:12px;color:#000;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;transition:opacity .15s}
.btn-conn:hover{opacity:.9}
.btn-conn:disabled{background:var(--s3);color:var(--mut);cursor:not-allowed}
.err-box{background:rgba(255,59,92,.08);border:1px solid rgba(255,59,92,.2);border-radius:8px;padding:10px 14px;color:var(--red);font-size:13px;margin-top:12px;display:none}
.spin{width:15px;height:15px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}

/* ══ APP SHELL ══ */
#sc-main{display:none;min-height:100vh}
.hdr{position:fixed;top:0;left:0;right:0;height:var(--header);background:var(--s1);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100}
.hdr-logo{font-size:19px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;margin-right:4px}
.search-wrap{flex:1;max-width:480px;position:relative}
.srch-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--mut);font-size:15px;pointer-events:none}
.srch{width:100%;background:var(--s2);border:1px solid var(--brd);border-radius:22px;padding:8px 14px 8px 36px;color:var(--txt);font-family:'Outfit',sans-serif;font-size:13px;outline:none}
.srch:focus{border-color:var(--acc)}
.srch::placeholder{color:var(--mut)}
.srch-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--mut);cursor:pointer;font-size:16px;display:none;padding:2px 4px}
.srch-clear.vis{display:block}
.srch-res{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--s1);border:1px solid var(--brd);border-radius:12px;max-height:400px;overflow-y:auto;display:none;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.srch-res.open{display:block}
.sr-sec{padding:8px 0}
.sr-lbl{font-size:10px;color:var(--mut);font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:4px 14px 6px}
.sr-item{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer}
.sr-item:hover{background:var(--s2)}
.sr-thumb{width:34px;height:34px;border-radius:5px;background:var(--s2);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.sr-thumb img{width:100%;height:100%;object-fit:cover}
.sr-info{flex:1;min-width:0}
.sr-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-meta{font-size:11px;color:var(--mut)}
.sr-type{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:700;flex-shrink:0}
.sr-type.ch{background:rgba(255,59,92,.15);color:var(--red)}
.sr-type.mov{background:rgba(0,194,255,.1);color:var(--acc)}
.sr-type.ser{background:rgba(0,119,255,.1);color:var(--acc2)}
.sr-empty{padding:24px;text-align:center;color:var(--mut);font-size:13px}
.sr-div{height:1px;background:var(--brd);margin:0 14px}
.hdr-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.hdr-btn{background:none;border:none;color:var(--mut);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.hdr-btn:hover{background:var(--s2);color:var(--txt)}
.hdr-sair{color:var(--red)!important}
.hdr-sair:hover{background:rgba(255,59,92,.12)!important}

/* ══ LAYOUT ══ */
.app-body{display:flex;padding-top:var(--header);min-height:100vh}
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--s1);border-right:1px solid var(--brd);position:fixed;top:var(--header);bottom:0;left:0;overflow-y:auto;z-index:50;display:flex;flex-direction:column}
.sb-section{padding:12px 8px}
.sb-lbl{font-size:10px;color:var(--mut);font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:4px 8px 8px}
.sb-btn{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;color:var(--mut);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;padding:8px 10px;border-radius:8px;text-align:left;transition:all .15s}
.sb-btn:hover{color:var(--txt);background:var(--s2)}
.sb-btn.on{color:var(--acc);background:rgba(0,194,255,.08)}
.sb-btn .ico{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sb-divider{height:1px;background:var(--brd);margin:4px 8px}
.sb-cats{padding:0 8px 12px}
.sb-search-w{padding:0 0 6px}
.sb-srch{width:100%;background:var(--s2);border:1px solid var(--brd);border-radius:7px;padding:7px 10px;color:var(--txt);font-family:'Outfit',sans-serif;font-size:12px;outline:none}
.sb-srch:focus{border-color:var(--brd)}
.sb-srch::placeholder{color:var(--mut)}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:none;color:var(--mut);font-family:'Outfit',sans-serif;font-size:12px;cursor:pointer;padding:6px 10px;border-radius:6px;text-align:left;transition:all .15s;position:relative}
.cat-btn:hover{color:var(--txt);background:var(--s2)}
.cat-btn.on{color:var(--acc)}
.cat-btn.pinned{border-left:2px solid var(--acc);padding-left:8px}
.cat-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left}
.cat-n{font-size:10px;background:var(--s2);padding:1px 6px;border-radius:8px;color:var(--mut);flex-shrink:0}
.pin-btn{background:none;border:none;color:var(--mut);font-size:11px;cursor:pointer;padding:2px 4px;border-radius:3px;opacity:0;transition:opacity .15s;flex-shrink:0}
.cat-btn:hover .pin-btn{opacity:1}
.cat-btn.pinned .pin-btn{opacity:1;color:var(--acc)}
.main{flex:1;margin-left:var(--sidebar);padding:20px 20px 40px;min-width:0}

/* ══ ACCOUNT STATUS BAR ══ */
.acct-bar{display:flex;align-items:center;flex-wrap:wrap;gap:10px;padding:10px 14px;background:var(--s1);border:1px solid var(--brd);border-radius:10px;margin-bottom:18px;font-size:12px}
.acct-item{display:flex;align-items:center;gap:6px;color:var(--mut)}
.acct-item b{color:var(--txt);font-family:monospace;font-size:11px}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;letter-spacing:.3px}
.status-pill.active{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.status-pill.expiring{background:rgba(245,158,11,.1);color:var(--orange);border:1px solid rgba(245,158,11,.2)}
.status-pill.expired{background:rgba(255,59,92,.1);color:var(--red);border:1px solid rgba(255,59,92,.2)}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.btn-refresh{display:flex;align-items:center;gap:6px;background:none;border:1px solid var(--brd);border-radius:7px;padding:5px 12px;color:var(--mut);font-family:'Outfit',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;margin-left:auto}
.btn-refresh:hover{border-color:var(--acc);color:var(--acc)}
.btn-refresh.spin-it .ri{display:inline-block;animation:sp .7s linear infinite}

/* ══ SECTION ══ */
.sec{margin-bottom:28px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mut)}
.sec-count{font-size:12px;color:var(--mut)}
.sec-more{font-size:12px;color:var(--acc);background:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif}
.page-hdr{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;margin-bottom:4px;border-bottom:1px solid var(--brd)}
.page-hdr .ph-title{font-size:15px;font-weight:700}
.page-hdr .ph-count{font-size:12px;color:var(--mut)}

/* ══ LOADING ══ */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:14px;color:var(--mut)}
.loading .spin{width:28px;height:28px;border-color:rgba(0,194,255,.2);border-top-color:var(--acc)}

/* ══ CHANNEL LIST ══ */
.ch-list{display:flex;flex-direction:column;gap:6px}
.ch-row{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--s1);border:1px solid var(--brd);border-radius:10px;cursor:pointer;transition:border-color .15s}
.ch-row:hover{border-color:var(--acc)}
.ch-num{font-size:11px;color:var(--mut);width:28px;text-align:right;flex-shrink:0}
.ch-logo{width:38px;height:38px;border-radius:7px;background:var(--s2);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.ch-logo img{width:100%;height:100%;object-fit:contain}
.ch-logo-fb{font-size:12px;font-weight:700;color:var(--mut);text-align:center;padding:2px;line-height:1.2}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-cat{font-size:11px;color:var(--mut);margin-top:1px}
.live-pill{font-size:9px;background:var(--red);color:#fff;padding:2px 6px;border-radius:3px;font-weight:700;letter-spacing:.5px;flex-shrink:0;animation:lpulse 2s infinite}
@keyframes lpulse{0%,100%{opacity:1}50%{opacity:.6}}
.fav-btn{background:none;border:none;color:var(--mut);font-size:16px;cursor:pointer;padding:4px;flex-shrink:0;transition:color .15s}
.fav-btn:hover,.fav-btn.on{color:#f5c518}

/* ══ VOD GRID (Smarters style) ══ */
.vod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:14px}
.vc{cursor:pointer}
.vc:hover .vc-poster{border-color:var(--acc);transform:scale(1.03)}
.vc-poster{aspect-ratio:2/3;background:var(--s1);border:1px solid var(--brd);border-radius:8px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:border-color .15s,transform .15s;margin-bottom:6px}
.vc-poster img{width:100%;height:100%;object-fit:cover}
.vc-fb{font-size:42px}
.vc-rat{position:absolute;top:5px;right:5px;background:rgba(0,119,255,.9);color:#fff;font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px}
.vc-fav{position:absolute;top:5px;left:5px;background:none;border:none;font-size:16px;cursor:pointer;color:rgba(255,255,255,.4);text-shadow:0 1px 3px rgba(0,0,0,.8);line-height:1;transition:color .15s}
.vc-fav:hover,.vc-fav.on{color:#f5c518}
.vc-title{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vc-sub{font-size:11px;color:var(--mut);margin-top:1px}

/* ══ CHIPS (histórico) ══ */
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--s1);border:1px solid var(--brd);border-radius:14px;padding:5px 12px;font-size:12px;cursor:pointer;transition:border-color .15s}
.chip:hover{border-color:var(--acc)}
.chip-t{color:var(--mut);font-size:10px}

/* ══ EMPTY ══ */
.empty{text-align:center;padding:60px 20px;color:var(--mut)}
.empty-ico{font-size:36px;margin-bottom:10px}
.empty small{display:block;margin-top:6px;font-size:12px}

/* ══ EPG BAR ══ */
.epg-bar{background:rgba(8,8,10,.96);border-top:1px solid rgba(255,59,92,.15);padding:8px 18px;display:flex;align-items:center;gap:16px;flex-shrink:0;min-height:52px;overflow-x:auto}
.epg-block{flex-shrink:0}
.epg-type{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px;font-weight:700}
.epg-type.live{color:var(--red)}
.epg-type.next{color:var(--mut)}
.epg-show{font-size:13px;font-weight:600;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.epg-time{font-size:11px;color:var(--mut);margin-top:1px}
.epg-prog-w{flex:1;min-width:80px;max-width:200px}
.epg-prog-bg{height:3px;background:var(--s3);border-radius:2px;overflow:hidden}
.epg-prog-fill{height:100%;background:var(--red);border-radius:2px;transition:width .5s}
.epg-sep{width:1px;height:30px;background:var(--brd);flex-shrink:0}

/* ══ MODAL ══ */
#modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:500;align-items:center;justify-content:center;padding:20px}
#modal-bg.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--brd);border-radius:14px;width:520px;max-width:94vw;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.modal-poster{width:100%;height:180px;object-fit:cover;display:block;flex-shrink:0}
.modal-body{padding:22px 24px;overflow-y:auto;flex:1}
.modal-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
.modal-title{font-size:20px;font-weight:700;line-height:1.3}
.modal-close{background:none;border:none;color:var(--mut);font-size:20px;cursor:pointer;flex-shrink:0;line-height:1}
.modal-close:hover{color:var(--txt)}
.modal-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.mtag{background:var(--s2);padding:3px 9px;border-radius:5px;font-size:11px;color:var(--mut)}
.modal-plot{font-size:13px;color:var(--mut);line-height:1.65;margin-bottom:18px}
.modal-acts{display:flex;gap:9px;flex-wrap:wrap}
.btn-play{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#000;border:none;border-radius:8px;padding:11px 24px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;flex:1;min-width:100px;transition:opacity .15s}
.btn-play:hover{opacity:.9}
.btn-fav-m{background:var(--s2);color:var(--txt);border:1px solid var(--brd);border-radius:8px;padding:11px 20px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-fav-m:hover{border-color:var(--mut)}

<script>
// ══════════ STATE ══════════
const S={
  mode:"",server:"",user:"",pass:"",m3uUrl:"",m3uName:"",
  expiry:null,maxCons:null,
  tab:"home",selCat:"",
  channels:[],movies:[],series:[],
  chCats:[],movCats:[],serCats:[],
  favorites:[],history:[],positions:{},watchTotals:{},pinnedCats:{},
  playing:null,
  epgData:{},epgTimer:null,
  _vArr:null,_vOff:0,
  tmdbTop10:[],tmdbLoaded:false,
};
let HLS=null,castCtx=null,isCasting=false;

// ══════════ INDEXEDDB CACHE ══════════
let _db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open("ms_cache",1);
    r.onupgradeneeded=e=>{if(!e.target.result.objectStoreNames.contains("data"))e.target.result.createObjectStore("data");};
    r.onsuccess=e=>{_db=e.target.result;res(_db);};
    r.onerror=()=>rej(r.error);
  });
}
function dbGet(k){return new Promise((res,rej)=>{const tx=_db.transaction("data","readonly");const r=tx.objectStore("data").get(k);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function dbSet(k,v){return new Promise((res,rej)=>{const tx=_db.transaction("data","readwrite");const r=tx.objectStore("data").put(v,k);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});}

// ══════════ LOGIN ══════════
function swTab(t){
  document.getElementById("form-xt").style.display=t==="xt"?"block":"none";
  document.getElementById("form-m3u").style.display=t==="m3u"?"block":"none";
  document.getElementById("tab-xt").className="tab-sw-btn"+(t==="xt"?" on":"");
  document.getElementById("tab-m3u").className="tab-sw-btn"+(t==="m3u"?" on":"");
}
function togglePwd(id,b){const i=document.getElementById(id);i.type=i.type==="password"?"text":"password";b.textContent=i.type==="password"?"👁":"🙈";}
function setBtn(id,on,lbl){const b=document.getElementById(id);if(!b)return;b.disabled=on;b.innerHTML=on?`<div class="spin"></div> Carregando...`:lbl;}
function showErr(id,msg){const e=document.getElementById(id);if(!e)return;e.textContent=msg;e.style.display=msg?"block":"none";}

async function loginXt(){
  const url=(document.getElementById("x-url").value||"").trim().replace(/\/+$/,"");
  const usr=document.getElementById("x-usr").value.trim();
  const pwd=document.getElementById("x-pwd").value.trim();
  showErr("err-xt","");
  if(!url){showErr("err-xt","⚠ Preencha o servidor.");return;}
  if(!usr||!pwd){showErr("err-xt","⚠ Preencha usuário e senha.");return;}
  setBtn("btn-xt",true);
  try{
    const r=await fetch(`${url}/player_api.php?username=${encodeURIComponent(usr)}&password=${encodeURIComponent(pwd)}&action=authenticate`);
    if(!r.ok)throw new Error("HTTP "+r.status);
    const d=await r.json();
    if(!d?.user_info?.auth)throw new Error("Credenciais inválidas.");
    S.mode="xtream";S.server=url;S.user=usr;S.pass=pwd;
    const ui=d.user_info;
    S.expiry=ui.exp_date?parseInt(ui.exp_date)*1000:null;
    S.maxCons=ui.max_connections||null;
    setBtn("btn-xt",false,"▶ Entrar");
    startApp();
  }catch(e){showErr("err-xt","⚠ "+e.message);setBtn("btn-xt",false,"▶ Entrar");}
}

async function loginM3U(){
  const url=(document.getElementById("m-url").value||"").trim();
  const name=document.getElementById("m-name").value.trim()||"Minha Lista";
  showErr("err-m3u","");
  if(!url){showErr("err-m3u","⚠ Preencha a URL.");return;}
  setBtn("btn-m3u",true);
  try{
    const r=await fetch(url);if(!r.ok)throw new Error("HTTP "+r.status);
    const txt=await r.text();if(!txt.includes("#EXTM3U"))throw new Error("M3U inválido.");
    S.mode="m3u";S.m3uUrl=url;S.m3uName=name;
    parseM3U(txt);setBtn("btn-m3u",false,"▶ Carregar");startApp();
  }catch(e){showErr("err-m3u","⚠ "+e.message);setBtn("btn-m3u",false,"▶ Carregar");}
}

function parseM3U(txt){
  // Fully rewritten based on Another IPTV Player's M3uParser + SeriesParser
  const attr=(line,key)=>{const m=line.match(new RegExp(key+'="([^"]*)"'));return m?m[1]:""};
  // Series detection regex — same as SeriesParser in Another IPTV Player
  const serRe=/^(.+?)\s+S(\d{1,2})\s*E(\d{1,3})/i;
  const serRe2=/^(.+?)\s+Season\s+(\d{1,2})\s+Episode\s+(\d{1,3})/i;
  const lines=txt.split("\n");
  let cur=null;
  const rawChannels=[];
  const seriesMap={}; // name -> {series_id, episodes:[]}
  let sid=1;
  for(const line of lines){
    const l=line.trim();
    if(l.startsWith("#EXTINF")){
      const comma=l.indexOf(",");
      const meta=comma!==-1?l.slice(0,comma):l;
      const name=comma!==-1?l.slice(comma+1).trim():"";
      cur={
        name,
        category_name:attr(meta,"group-title")||"Geral",
        stream_icon:attr(meta,"tvg-logo")||"",
        tvg_id:attr(meta,"tvg-id")||"",
        tvg_name:attr(meta,"tvg-name")||"",
        tvg_rec:attr(meta,"tvg-rec")||"",    // catchup support flag
        user_agent:attr(meta,"user-agent")||"",
        _m3u:true
      };
    } else if(l.startsWith("#EXTGRP:")){
      if(cur)cur.category_name=l.slice(8).trim()||cur.category_name;
    } else if((l.startsWith("http")||l.startsWith("rtmp")||l.startsWith("rtp"))&&cur){
      cur._url=l;
      // Detect content type by URL (like Another IPTV Player's _detectContentType)
      const lo=l.toLowerCase();
      cur._urlType=lo.includes("/movie/")||lo.includes("movies")?"movie":
                  lo.includes("/series/")||lo.includes("series")?"series":"channel";
      cur.stream_id=sid++;
      rawChannels.push(cur);cur=null;
    }
  }
  // Separate by type and detect series by S##E## pattern in name
  S.channels=[];S.movies=[];
  const serEpisodes=[]; // raw episodes to group
  for(const item of rawChannels){
    if(item._urlType==="movie"){S.movies.push(item);continue;}
    if(item._urlType==="series"){serEpisodes.push(item);continue;}
    // Live channel — try series detection from name
    const m=serRe.exec(item.name)||serRe2.exec(item.name);
    if(m){serEpisodes.push({...item,_serName:m[1].trim(),_season:parseInt(m[2]),_ep:parseInt(m[3])});}
    else{S.channels.push(item);}
  }
  // Group series episodes into series objects (like SeriesParser.generateSeriesId)
  S.series=[];const serIdx={};
  for(const ep of serEpisodes){
    const sn=ep._serName||ep.name;
    if(!serIdx[sn]){
      const newSer={
        series_id:sid++,name:sn,
        cover:ep.stream_icon||"",
        category_name:ep.category_name,
        _m3u:true,_episodes:[]
      };
      serIdx[sn]=newSer;S.series.push(newSer);
    }
    serIdx[sn]._episodes.push({
      id:ep.stream_id,episode_num:ep._ep||1,season:ep._season||1,
      title:ep.name,_url:ep._url,container_extension:"mp4",
      info:{duration:""}
    });
  }
  S.chCats=[...new Set(S.channels.map(c=>c.category_name).filter(Boolean))];
  S.movCats=[...new Set(S.movies.map(m=>m.category_name).filter(Boolean))];
  S.serCats=[...new Set(S.series.map(s=>s.category_name).filter(Boolean))];
}

async function fetchXtream(){
  showSkeleton();
  buildSidebar();
  const cKey="ms_list_"+S.user+"_"+S.server;
  const cached=await dbGet(cKey).catch(()=>null);
  if(cached&&cached.ts&&(Date.now()-cached.ts)<3600000){
    applyData(cached.data);
    // Refresh silently in background
    fetchFresh(cKey).catch(()=>{});
    return;
  }
  await fetchFresh(cKey);
}

async function fetchFresh(cKey){
  try{
    const[chs,movs,sers]=await Promise.all([
      apiGet("get_live_streams"),apiGet("get_vod_streams"),apiGet("get_series")
    ]);
    const data={channels:Array.isArray(chs)?chs:[],movies:Array.isArray(movs)?movs:[],series:Array.isArray(sers)?sers:[]};
    await dbSet(cKey,{data,ts:Date.now()});
    applyData(data);
  }catch(e){
    if(!S.channels.length) document.getElementById("main-content").innerHTML=`<div class="loading"><div class="empty-ico">⚠️</div>Erro ao carregar.<br><small>${e.message}</small></div>`;
  }
}

function applyData(d){
  S.channels=d.channels||[];S.movies=d.movies||[];S.series=d.series||[];
  S.chCats=[...new Set(S.channels.map(c=>c.category_name).filter(Boolean))];

  S.serCats=[...new Set(S.series.map(s=>s.category_name).filter(Boolean))];
  renderAll();
  // Carrega TMDB após lista pronta — assim o match funciona
  loadTMDB();
}

const TMDB_KEY="8265bd1679663a7ea12ac168da84d2e8";
const TMDB_IMG="https://image.tmdb.org/t/p/w300";

async function loadTMDB(){
  try{
    const today=new Date().toISOString().slice(0,10);
    const cKey="ms_tmdb_"+today;
    const cached=await dbGet(cKey).catch(()=>null);
    if(cached){S.tmdbTop10=cached;S.tmdbLoaded=true;if(S.tab==="home")refreshTop10();return;}
    const[mr,sr]=await Promise.all([
      fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${TMDB_KEY}&language=pt-BR`).then(r=>r.json()),
      fetch(`https://api.themoviedb.org/3/trending/tv/week?api_key=${TMDB_KEY}&language=pt-BR`).then(r=>r.json()),
    ]);
    const movItems=(mr.results||[]).map(t=>({tmdb:t,type:"movie",title:t.title,poster:t.poster_path,rating:t.vote_average,pop:t.popularity||0}));
    const serItems=(sr.results||[]).map(t=>({tmdb:t,type:"series",title:t.name,poster:t.poster_path,rating:t.vote_average,pop:t.popularity||0}));
    const merged=[...movItems,...serItems].sort((a,b)=>b.pop-a.pop).slice(0,10);
    S.tmdbTop10=merged;S.tmdbLoaded=true;
    await dbSet(cKey,merged);
    if(S.tab==="home")refreshTop10();
  }catch(e){console.warn("[TMDB]",e.message);}
}

function tmdbMatch(title,type){
  const clean=t=>(t||"").toLowerCase().replace(/[:\-\u2013\u2014!?.,'"""''()\[\]]/g," ").replace(/\s+/g," ").trim();
  const q=clean(title);
  const arr=type==="movie"?S.movies:S.series;
  return arr.find(i=>clean(i.name||i.title||"")===q)
    ||arr.find(i=>clean(i.name||i.title||"").startsWith(q.slice(0,Math.min(q.length,20))))
    ||arr.find(i=>{const s=q.slice(0,Math.max(10,Math.floor(q.length*.7)));return clean(i.name||i.title||"").includes(s);})||null;
}

async function fetchEPG(streamId){
  if(S.mode!=="xtream")return null;
  try{const d=await apiGet("get_short_epg",`&stream_id=${streamId}&limit=4`);return d?.epg_listings||null;}catch(e){return null;}

function epgTime(t){if(!t)return null;if(typeof t==="number")return new Date(t*1000);return new Date(String(t).replace(" ","T"));}
function hhmm(d){return d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});}
function decodeTitle(t){try{return atob(t||"").replace(/[^\x20-\x7E\u00C0-\u024F]/g,"").trim()||t||"—";}catch{return t||"—";}}

function updateEPG(listings){
  const bar=document.getElementById("epg-bar");
  if(!listings?.length){bar.style.display="none";return;}
  bar.style.display="flex";
  const now=Date.now();
  let cur=null,nxt=null;
  for(const ep of listings){
    const s=epgTime(ep.start||ep.start_timestamp),e=epgTime(ep.stop||ep.stop_timestamp);
    if(!s||!e)continue;
    if(+s<=now&&+e>now){cur=ep;continue;}
    if(+s>now&&!nxt)nxt=ep;
  }
  if(cur){
    const title=decodeTitle(cur.title);
    document.getElementById("epg-now-show").textContent=title;
    const s=epgTime(cur.start||cur.start_timestamp),e=epgTime(cur.stop||cur.stop_timestamp);
    if(s&&e){document.getElementById("epg-now-time").textContent=`${hhmm(s)} – ${hhmm(e)}`;document.getElementById("epg-prog").style.width=Math.min(100,(now-s)/(e-s)*100)+"%";}
    document.getElementById("pl-epg-lbl").textContent="AO VIVO";
    document.getElementById("pl-epg-show").textContent=title;
  } else {
    document.getElementById("epg-now-show").textContent="—";document.getElementById("epg-now-time").textContent="";document.getElementById("epg-prog").style.width="0%";
    document.getElementById("pl-epg-lbl").textContent="";document.getElementById("pl-epg-show").textContent="";
  }
  if(nxt){document.getElementById("epg-next-show").textContent=decodeTitle(nxt.title);const s=epgTime(nxt.start||nxt.start_timestamp);if(s)document.getElementById("epg-next-time").textContent=hhmm(s);}
  else{document.getElementById("epg-next-show").textContent="—";document.getElementById("epg-next-time").textContent="";}
}
function stopEPG(){if(S.epgTimer){clearInterval(S.epgTimer);S.epgTimer=null;}}

    // Group by season
    const bySeason={};

    if(!seasons.length){body.innerHTML=`<div style="font-size:12px;color:var(--mut)">Sem episódios disponíveis.</div>`;return;}

function pickSeason(n){

function renderEps(eps){
  if(!eps.length)return`<div style="font-size:12px;color:var(--mut);padding:8px">Sem episódios.</div>`;

    const title=ep.title||`Episódio ${ep.episode_num||"?"}`;

function vodGrid(arr,type){return`<div class="vod-grid">${vodCards(arr,type)}</div>`;}
function vodCards(arr,type){
  return arr.map(m=>{
    const sid=type==="series"?m.series_id:m.stream_id;
    const fk=(type==="series"?"ser_":"mov_")+sid;
    const isFav=S.favorites.includes(fk);
    const cover=m.stream_icon||m.cover||"";
    const rat=parseFloat(m.rating||m.rating_5based||0)||0;
    // Progress bar (from watchTotals — like Another IPTV Player)
    const wt=S.watchTotals[String(sid)];
    const pct=(wt&&wt.total>0)?Math.min(98,Math.round(wt.watch/wt.total*100)):0;
    return `<div class="vc" onclick="openModal(${sid},'${type}')">
      <div class="vc-poster">
        ${cover&&cover.startsWith("http")?`<img src="${cover}" loading="lazy" onerror="this.style.display='none'"/>`:
          `<span class="vc-fb">${type==="series"?"📺":"🎬"}</span>`}
        ${rat?`<span class="vc-rat">${rat.toFixed(0)}</span>`:""}
        <button class="vc-fav${isFav?" on":""}" onclick="event.stopPropagation();toggleFav('${fk}')">${isFav?"★":"☆"}</button>
        ${pct>2?`<div class="vc-progress"><div class="vc-progress-fill" style="width:${pct}%"></div></div>`:""}
      </div>
      <div class="vc-title">${esc(m.name||m.title||"")}</div>
      <div class="vc-sub">${m.year||""}${m.genre?" · "+m.genre.split(",")[0]:""}</div>
    </div>`;
  }).join("");
}

// ── Virtualization ──
function virtChList(arr){
  if(arr.length<=60)return chList(arr);
  S._vArr=arr;S._vOff=0;
  const w=document.createElement("div");w.id="vw";w.innerHTML=chList(arr.slice(0,60));
  const s=document.createElement("div");s.id="vs";s.style.height="1px";w.appendChild(s);
  setTimeout(()=>{const o=new IntersectionObserver(e=>{if(e[0].isIntersecting)_moreChList();},{rootMargin:"300px"});const el=document.getElementById("vs");if(el)o.observe(el);},80);
  return w.outerHTML;
}
function _moreChList(){
  if(!S._vArr)return;S._vOff+=60;
  const next=S._vArr.slice(S._vOff,S._vOff+60);if(!next.length)return;
  const w=document.getElementById("vw"),s=document.getElementById("vs");if(!w)return;
  const tmp=document.createElement("div");tmp.innerHTML=chList(next);
  Array.from(tmp.querySelector(".ch-list")?.children||[]).forEach(c=>w.querySelector(".ch-list")?.appendChild(c));
  if(S._vOff+60>=S._vArr.length)s?.remove();
}
function virtVodGrid(arr,type){
  if(arr.length<=40)return vodGrid(arr,type);
  S._vArr=arr;S._vOff=0;
  const g=document.createElement("div");g.className="vod-grid";g.id="vg";g.innerHTML=vodCards(arr.slice(0,40),type);
  const s=document.createElement("div");s.id="vs";s.style.height="1px";
  const w=document.createElement("div");w.id="vw";w.appendChild(g);w.appendChild(s);
  setTimeout(()=>{const o=new IntersectionObserver(e=>{if(e[0].isIntersecting)_moreVodGrid(type);},{rootMargin:"300px"});const el=document.getElementById("vs");if(el)o.observe(el);},80);
  return w.outerHTML;
}
function _moreVodGrid(type){
  if(!S._vArr)return;S._vOff+=40;
  const next=S._vArr.slice(S._vOff,S._vOff+40);if(!next.length)return;
  document.getElementById("vg")?.insertAdjacentHTML("beforeend",vodCards(next,type));
  if(S._vOff+40>=S._vArr.length)document.getElementById("vs")?.remove();
}

  if(chs.length&&movs.length)h+=`<div class="sr-div"></div>`;
  if(movs.length){h+=`<div class="sr-sec"><div class="sr-lbl">🎬 Filmes</div>${movs.map(m=>`<div class="sr-item" onclick="closeSrch();openModal(${m.stream_id},'movie')"><div class="sr-thumb">${m.stream_icon&&m.stream_icon.startsWith("http")?`<img src="${m.stream_icon}" loading="lazy"/>`:""}</div><div class="sr-info"><div class="sr-name">${esc(m.name||"")}</div><div class="sr-meta">${m.year||""}</div></div><span class="sr-type mov">FILME</span></div>`).join("")}</div>`;}
  if((chs.length||movs.length)&&sers.length)h+=`<div class="sr-div"></div>`;
  if(sers.length){h+=`<div class="sr-sec"><div class="sr-lbl">📺 Séries</div>${sers.map(s=>`<div class="sr-item" onclick="closeSrch();openModal(${s.series_id},'series')"><div class="sr-thumb">${s.cover&&s.cover.startsWith("http")?`<img src="${s.cover}" loading="lazy"/>`:""}</div><div class="sr-info"><div class="sr-name">${esc(s.name||"")}</div><div class="sr-meta">${s.genre||""}</div></div><span class="sr-type ser">SÉRIE</span></div>`).join("")}</div>`;}
  res.innerHTML=h;res.className="srch-res open";

// ══════════ MODAL ══════════
function findItem(id,type){
  if(type==="channel")return S.channels.find(c=>String(c.stream_id)===String(id));
  if(type==="movie")return S.movies.find(m=>String(m.stream_id)===String(id));
  return S.series.find(s=>String(s.series_id)===String(id));
}
function openModal(id,type){
  const item=findItem(id,type);if(!item)return;
  if(type==="series"){openSeriesModal(item);return;}
  const sid=type==="series"?item.series_id:item.stream_id;
  const fk=(type==="channel"?"ch_":type==="movie"?"mov_":"ser_")+sid;
  const isFav=S.favorites.includes(fk);
  const cover=item.stream_icon||item.cover||"";
  const rat=parseFloat(item.rating||item.rating_5based||0)||0;
  // Base modal (fast render)
  let h="";
  if(cover&&cover.startsWith("http"))h+=`<img class="modal-poster" src="${cover}" onerror="this.style.display='none'"/>`;
  h+=`<div class="modal-body"><div class="modal-hdr"><div class="modal-title">${esc(item.name||item.title||"")}</div><button class="modal-close" onclick="closeModal()">✕</button></div>`;
  if(type==="channel"){
    h+=`<div class="ch-live-tag"><span class="live-pill" style="animation:none">LIVE</span> Ao Vivo · ${esc(item.category_name||"")}</div>`;
  } else {
    const wt=S.watchTotals[String(sid)];
    const pct=(wt&&wt.total>0)?Math.min(98,Math.round(wt.watch/wt.total*100)):0;
    if(pct>2){
      const wm=Math.floor(wt.watch/60),ws=String(Math.floor(wt.watch%60)).padStart(2,"0");
      const tm=Math.floor(wt.total/60),ts2=String(Math.floor(wt.total%60)).padStart(2,"0");
      h+=`<div class="continue-bar">
        <div class="continue-bar-track"><div class="continue-bar-fill" style="width:${pct}%"></div></div>
        <div class="continue-bar-label">▶ ${wm}:${ws} assistido de ${tm}:${ts2}</div>
      </div>`;
    }
    h+=`<div class="modal-tags">${rat?`<span class="mtag">★ ${rat.toFixed(1)}</span>`:""}${item.genre?`<span class="mtag">${esc(item.genre.split(",")[0])}</span>`:""}${item.year?`<span class="mtag">${item.year}</span>`:""}${item.category_name?`<span class="mtag">${esc(item.category_name)}</span>`:""}</div>`;
    if(item.plot)h+=`<div class="modal-plot">${esc(item.plot)}</div>`;
    // Placeholder for async vod_info
    if(type==="movie")h+=`<div id="vod-info-extra" style="color:var(--mut);font-size:12px;margin-bottom:12px">Carregando detalhes...</div>`;
  }
  const playBtn=pct>2?"▶ Continuar":"▶ Assistir";
  h+=`<div class="modal-acts">
    <button class="btn-play" id="modal-play-btn" onclick="openPlayer(${JSON.stringify(item)},'${type}','${esc(item.name||item.title||"")}','${esc(item.category_name||"")}')">
      ${playBtn}
    </button>
    <button class="btn-fav-m${isFav?" on":""}" id="mfav" onclick="toggleFav('${fk}')">${isFav?"★ Favorito":"☆ Favoritar"}</button>
  </div></div>`;
  document.getElementById("modal-inner").innerHTML=h;
  document.getElementById("modal-bg").className="open";
  // Async: fetch vod_info for movies (like Another IPTV Player's getVodInfo)
  if(type==="movie"&&S.mode==="xtream") fetchAndRenderVodInfo(sid,item);
}

async function fetchAndRenderVodInfo(vodId,item){
  const el=document.getElementById("vod-info-extra");
  try{
    const d=await apiGet("get_vod_info",`&vod_id=${vodId}`);
    if(!el||!document.getElementById("modal-bg").classList.contains("open"))return;
    const info=d?.info||d?.movie_data||d||{};
    // Extract the best fields (exactly what Another IPTV Player reads)
    const plot=info.plot||info.description||item.plot||"";
    const director=info.director||"";
    const cast=info.cast||info.actors||"";
    const duration=info.duration||info.duration_secs||"";
    const releaseDate=info.releaseDate||info.release_date||info.year||item.year||"";
    const trailer=info.youtube_trailer||item.youtube_trailer||"";
    const backdropList=info.backdrop_path;
    // Update poster if we got a better backdrop
    if(backdropList){
      const bd=Array.isArray(backdropList)?backdropList[0]:backdropList;
      if(bd&&bd.startsWith("http")){
        const poster=document.querySelector(".modal-poster");
        if(poster&&poster.tagName==="IMG")poster.src=bd;
      }
    }
    // Update plot if we got better one
    if(plot&&!item.plot){
      const plotEl=document.querySelector(".modal-plot");
      if(!plotEl){
        el.insertAdjacentHTML("beforebegin",`<div class="modal-plot">${esc(plot)}</div>`);
      }
    }
    // Build info grid
    let infoHtml="";
    if(director)infoHtml+=`<div class="modal-info-card"><div class="modal-info-lbl">🎬 Diretor</div><div class="modal-info-val">${esc(director)}</div></div>`;
    if(releaseDate)infoHtml+=`<div class="modal-info-card"><div class="modal-info-lbl">📅 Lançamento</div><div class="modal-info-val">${esc(String(releaseDate))}</div></div>`;
    if(duration){
      const secs=parseInt(duration)||0;
      const dm=Math.floor(secs/60),dh=Math.floor(dm/60),dr=dm%60;
      const durStr=dh>0?`${dh}h ${dr}min`:`${dm} min`;
      infoHtml+=`<div class="modal-info-card"><div class="modal-info-lbl">⏱ Duração</div><div class="modal-info-val">${durStr}</div></div>`;
    }
    if(cast)infoHtml+=`<div class="modal-info-card" style="grid-column:1/-1"><div class="modal-info-lbl">👥 Elenco</div><div class="modal-info-val">${esc(cast)}</div></div>`;
    let trailerHtml="";
    if(trailer){
      const ytUrl=trailer.includes("youtube")||trailer.includes("youtu.be")?trailer:`https://www.youtube.com/watch?v=${trailer}`;

// ══ AUTO-RECONNECT (inspired by Another IPTV Player's connectivity + error handling) ══
let _reconnectTimer=null;
let _reconnectAttempts=0;
const MAX_RECONNECT=5;

function playStream(url){
  const v=document.getElementById("vid");
  document.getElementById("pl-err").textContent="";
  clearTimeout(_reconnectTimer);_reconnectAttempts=0;
  if(HLS){HLS.destroy();HLS=null;}
  if(!url){document.getElementById("pl-err").textContent="⚠ URL indisponível.";return;}
  if(url.includes(".m3u8")&&typeof Hls!=="undefined"&&Hls.isSupported()){
    HLS=new Hls({
      maxBufferLength:20,lowLatencyMode:false,
      // Faster recovery settings
      maxBufferHole:0.5,highBufferWatchdogPeriod:2,
    });
    HLS.loadSource(url);HLS.attachMedia(v);
    HLS.on(Hls.Events.MANIFEST_PARSED,()=>v.play().catch(()=>{}));
    HLS.on(Hls.Events.ERROR,(evt,d)=>{
      if(!d.fatal)return;
      const errEl=document.getElementById("pl-err");
      if(d.type===Hls.ErrorTypes.NETWORK_ERROR){
        // Network error → try to recover first
        HLS.startLoad();
        _scheduleReconnect(url);
      } else {
        if(errEl)errEl.textContent="⚠ Erro no stream.";
        _scheduleReconnect(url);
      }
    });
  } else if(url.includes(".m3u8")&&v.canPlayType("application/vnd.apple.mpegurl")){
    v.src=url;v.load();v.play().catch(()=>{});
    // Native HLS — listen for error and reconnect
    v.onerror=()=>_scheduleReconnect(url);
  } else {
    v.src=url;v.load();v.play().catch(()=>{});
    v.onerror=()=>_scheduleReconnect(url);
  }
}

function _scheduleReconnect(url){
  // Only reconnect for live channels (like Another IPTV Player's completed.listen)
  if(!S.playing||S.playing.type!=="channel")return;
  if(_reconnectAttempts>=MAX_RECONNECT){
    const errEl=document.getElementById("pl-err");
    if(errEl)errEl.textContent=`⚠ Sem sinal após ${MAX_RECONNECT} tentativas.`;
    return;
  }
  clearTimeout(_reconnectTimer);
  _reconnectAttempts++;
  const delay=Math.min(2000*_reconnectAttempts,15000); // backoff: 2s,4s,6s...15s
  const errEl=document.getElementById("pl-err");
  if(errEl)errEl.textContent=`↻ Reconectando (${_reconnectAttempts}/${MAX_RECONNECT})...`;
  _reconnectTimer=setTimeout(()=>{
    if(!S.playing||document.getElementById("sc-player").className!=="open")return;
    const errEl2=document.getElementById("pl-err");
    if(errEl2)errEl2.textContent="";
    playStream(url);
  },delay);
}
function togglePlay(){const v=document.getElementById("vid"),b=document.getElementById("pl-pp");v.paused?(v.play(),b.textContent="⏸"):(v.pause(),b.textContent="▶");}

// ══════════ 1. RESUME POSITION (VOD) ══════════
// Salva posição a cada 5s e retoma automaticamente ao reabrir
let _posInterval=null;

function startPositionTracker(item,type){
  clearInterval(_posInterval);
  if(type==="channel")return;
  const v=document.getElementById("vid");
  // Save every 5s — matches Another IPTV Player's Timer(5 seconds) debounce
  _posInterval=setInterval(()=>{
    if(!v.paused&&v.currentTime>5&&v.duration>0){
      const sid=String(item.stream_id||item.series_id||"");
      S.positions[sid]=Math.floor(v.currentTime);
      // Also save watchDuration + totalDuration like WatchHistory model
      S.watchTotals[sid]={watch:Math.floor(v.currentTime),total:Math.floor(v.duration)};
      saveState();
    }
  },5000);
}

function stopPositionTracker(){
  clearInterval(_posInterval);_posInterval=null;
}

function checkResume(item,type){
  if(type==="channel")return;
  const sid=String(item.stream_id||item.series_id||"");
  const pos=S.positions[sid]||0;
  if(pos<10)return;
  const v=document.getElementById("vid");
  const banner=document.getElementById("resume-banner");
  const txt=document.getElementById("resume-text");
  // Wait for video to be ready then seek
  const seek=()=>{
    if(v.duration&&pos<v.duration-30){
      v.currentTime=pos;
      const m=Math.floor(pos/60),s=String(Math.floor(pos%60)).padStart(2,"0");
      if(txt)txt.textContent=`▶ Continuando de ${m}:${s}`;
      if(banner)banner.style.display="block";
      setTimeout(()=>{if(banner)banner.style.display="none";},5000);
    }
    v.removeEventListener("canplay",seek);
  };
  v.addEventListener("canplay",seek);
}

function dismissResume(){
  const b=document.getElementById("resume-banner");
  if(b)b.style.display="none";
}

// ══════════ 2. EPG 7-DAY GUIDE ══════════
let _epgFull={}; // { stream_id: { "2024-01-15": [{title,start,end},...] } }
let _epgGuideId=null;

async function fetchEPGFull(streamId){
  if(S.mode!=="xtream")return null;
  if(_epgFull[streamId])return _epgFull[streamId];
  try{
    // get_epg returns up to 7 days
    const d=await apiGet("get_epg",`&stream_id=${streamId}`);
    if(!d?.epg_listings?.length)return null;
    // Group by date
    const byDay={};
    for(const ep of d.epg_listings){
      const start=epgTime(ep.start||ep.start_timestamp);
      if(!start)continue;
      const dateKey=start.toLocaleDateString("pt-BR");
      if(!byDay[dateKey])byDay[dateKey]=[];
      byDay[dateKey].push(ep);
    }
    _epgFull[streamId]=byDay;
    return byDay;
  }catch(e){return null;}
}

function openEPGGuide(){
  if(!S.playing||S.playing.type!=="channel")return;
  const item=S.playing.item;
  const name=S.playing.name;
  _epgGuideId=item.stream_id;
  const bg=document.getElementById("epg-modal-bg");
  const titleEl=document.getElementById("epg-modal-title");
  const subEl=document.getElementById("epg-modal-sub");
  const body=document.getElementById("epg-modal-body");
  const tabs=document.getElementById("epg-day-tabs");
  if(titleEl)titleEl.textContent=name;
  if(subEl)subEl.textContent="Programação dos próximos 7 dias";
  if(body)body.innerHTML=`<div style="padding:24px;text-align:center;color:var(--mut)"><div class="spin" style="width:22px;height:22px;border-color:rgba(0,194,255,.2);border-top-color:var(--acc);margin:0 auto 10px"></div>Carregando guia...</div>`;
  if(tabs)tabs.innerHTML="";
  bg.style.display="flex";
  fetchEPGFull(item.stream_id).then(byDay=>{
    if(!byDay||!Object.keys(byDay).length){
      if(body)body.innerHTML=`<div style="padding:24px;text-align:center;color:var(--mut)">EPG não disponível para este canal.</div>`;
      return;
    }
    const days=Object.keys(byDay);
    // Day tabs
    if(tabs){
      tabs.innerHTML=days.map((d,i)=>`<button onclick="showEPGDay('${d}')" id="epg-day-${i}"
        style="background:${i===0?"rgba(0,194,255,.1)":"var(--s2)"};border:1px solid ${i===0?"var(--acc)":"var(--brd)"};
        border-radius:6px;padding:5px 12px;font-size:12px;color:${i===0?"var(--acc)":"var(--mut)"};
        cursor:pointer;font-family:'Outfit',sans-serif;white-space:nowrap;transition:all .15s">${d}</button>`).join("");
    }
    showEPGDay(days[0],byDay);
  });
}

function showEPGDay(dateKey,byDayArg){
  const byDay=byDayArg||_epgFull[_epgGuideId];
  if(!byDay)return;
  const progs=byDay[dateKey]||[];
  const body=document.getElementById("epg-modal-body");
  if(!body)return;
  // Update tab highlight
  const tabs=document.getElementById("epg-day-tabs");
  if(tabs){
    Array.from(tabs.children).forEach(btn=>{
      const active=btn.textContent===dateKey;
      btn.style.background=active?"rgba(0,194,255,.1)":"var(--s2)";
      btn.style.borderColor=active?"var(--acc)":"var(--brd)";
      btn.style.color=active?"var(--acc)":"var(--mut)";
    });
  }
  if(!progs.length){body.innerHTML=`<div style="padding:24px;text-align:center;color:var(--mut)">Sem programação para este dia.</div>`;return;}
  const now=Date.now();
  body.innerHTML=progs.map(ep=>{
    const start=epgTime(ep.start||ep.start_timestamp);
    const end=epgTime(ep.stop||ep.stop_timestamp);
    const title=decodeTitle(ep.title||"");
    const desc=ep.description?decodeTitle(ep.description):"";
    const isNow=start&&end&&+start<=now&&+end>now;
    const isPast=end&&+end<now;
    const canCatchup=isPast&&ep.has_archive;
    return `<div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--brd);opacity:${isPast&&!canCatchup?.5:1}">
      <div style="flex-shrink:0;width:52px;text-align:right;font-size:11px;font-family:monospace;color:${isNow?"var(--acc)":"var(--mut)"};margin-top:2px">${start?hhmm(start):""}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:${isNow?"700":"500"};color:${isNow?"var(--txt)":"var(--txt2)"};display:flex;align-items:center;gap:6px">
          ${isNow?`<span style="font-size:9px;background:var(--red);color:#fff;padding:1px 5px;border-radius:3px;font-weight:700;letter-spacing:.5px">AO VIVO</span>`:""}
          ${esc(title)}
        </div>
        ${desc?`<div style="font-size:11px;color:var(--mut);margin-top:3px;line-height:1.5;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${esc(desc)}</div>`:""}
        ${end&&start?`<div style="font-size:10px;color:var(--mut);margin-top:3px">${hhmm(start)} – ${hhmm(end)} · ${Math.round((+end-+start)/60000)} min</div>`:""}
      </div>
      ${canCatchup?`<button onclick="playCatchup(${_epgGuideId},'${esc(title)}',${ep.start||0},${ep.stop||0})"
        style="flex-shrink:0;background:rgba(0,194,255,.1);border:1px solid rgba(0,194,255,.2);border-radius:6px;padding:4px 10px;color:var(--acc);font-size:11px;cursor:pointer;font-family:'Outfit',sans-serif;align-self:center">⏮ Ver</button>`:""}
    </div>`;
  }).join("");
}

let _mvLayout=4; // 2 ou 4
let _mvSlots=[]; // [{ch,hls},...]
let _mvPickSlot=null;
const MV_MAX=4;

function openMV(){
  if(!S.channels.length){toast("Carregue uma lista primeiro.");return;}
  _mvLayout=4;_mvSlots=[];
  document.getElementById("sc-multiview").style.display="flex";
  buildMVGrid();
}

function closeMV(){
  // Destruir todos os HLS instances
  _mvSlots.forEach(s=>{if(s.hls){s.hls.destroy();}if(s.vid){s.vid.pause();s.vid.src="";}});
  _mvSlots=[];
  document.getElementById("sc-multiview").style.display="none";
  document.getElementById("mv-picker").style.display="none";
}

function setMVLayout(n){
  _mvLayout=n;
  // Keep only n slots
  _mvSlots.slice(n).forEach(s=>{if(s.hls)s.hls.destroy();if(s.vid){s.vid.pause();s.vid.src="";}});
  _mvSlots=_mvSlots.slice(0,n);
  buildMVGrid();
  document.getElementById("mv-btn-2").classList.toggle("active",n===2);
  document.getElementById("mv-btn-4").classList.toggle("active",n===4);
}

function buildMVGrid(){
  const grid=document.getElementById("mv-grid");
  if(!grid)return;
  const cols=_mvLayout===2?2:2;
  const rows=_mvLayout===2?1:2;
  grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  grid.style.gridTemplateRows=`repeat(${rows},1fr)`;
  grid.innerHTML="";
  for(let i=0;i<_mvLayout;i++){
    const slot=_mvSlots[i];
    const cell=document.createElement("div");
    cell.style.cssText="position:relative;background:#050505;border:1px solid #1a1a1a;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer";
    cell.id="mv-cell-"+i;
    if(slot?.ch){
      // Has channel — show video
      const v=document.createElement("video");
      v.style.cssText="width:100%;height:100%;object-fit:contain;display:block";
      v.muted=(i>0); // only first slot has audio
      v.playsInline=true;
      v.controls=false;
      cell.appendChild(v);
      // Channel label
      const lbl=document.createElement("div");
      lbl.style.cssText="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.8));padding:8px 10px 6px;font-size:12px;font-weight:600;pointer-events:none";
      lbl.textContent=slot.ch.name||"Canal";
      cell.appendChild(lbl);
      // Mute toggle
      const muteBtn=document.createElement("button");
      muteBtn.style.cssText="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.7);border:none;color:#fff;font-size:13px;width:28px;height:28px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center";
      muteBtn.textContent=i===0?"🔊":"🔇";
      muteBtn.onclick=(e)=>{e.stopPropagation();toggleMVAudio(i,v,muteBtn);};
      cell.appendChild(muteBtn);
      cell.onclick=()=>openMVPicker(i);
      _mvSlots[i].vid=v;
      loadMVStream(i,streamUrl(slot.ch,"channel"),v);
    } else {
      // Empty slot
      const add=document.createElement("div");
      add.style.cssText="display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--mut)";
      add.innerHTML=`<div style="font-size:32px;opacity:.4">+</div><div style="font-size:12px">Adicionar canal</div>`;
      cell.appendChild(add);
      cell.onclick=()=>openMVPicker(i);
    }
    grid.appendChild(cell);
  }
}

function loadMVStream(slotIdx,url,vid){
  // Destroy old HLS if exists
  const old=_mvSlots[slotIdx]?.hls;
  if(old){old.destroy();}
  if(!url)return;
  let h=null;
  if(url.includes(".m3u8")&&typeof Hls!=="undefined"&&Hls.isSupported()){
    h=new Hls({maxBufferLength:10,lowLatencyMode:false,autoStartLoad:true});
    h.loadSource(url);h.attachMedia(vid);
    h.on(Hls.Events.MANIFEST_PARSED,()=>vid.play().catch(()=>{}));
    _mvSlots[slotIdx].hls=h;
  } else if(url.includes(".m3u8")&&vid.canPlayType("application/vnd.apple.mpegurl")){
    vid.src=url;vid.load();vid.play().catch(()=>{});
  } else {
    vid.src=url;vid.load();vid.play().catch(()=>{});
  }
}

function toggleMVAudio(slotIdx,vid,btn){
  // Mute all others, unmute this one
  _mvSlots.forEach((s,i)=>{if(s.vid)s.vid.muted=(i!==slotIdx);});
  document.querySelectorAll("#mv-grid button").forEach((b,i)=>b.textContent=i===slotIdx?"🔊":"🔇");
}

function openMVPicker(slotIdx){

  const srch=document.getElementById("mv-pick-srch");

        <div style="font-size:11px;color:var(--mut)">${esc(ch.category_name||"")}</div>

function selectMVChannel(streamId){
  const ch=S.channels.find(c=>String(c.stream_id)===String(streamId));

  while(_mvSlots.length<=_mvPickSlot)_mvSlots.push({ch:null,hls:null,vid:null});

  closeMVPicker();
  buildMVGrid();

window.__onGCastApiAvailable=function(ok){if(ok)initCast();};
function initCast(){
  if(!window.chrome?.cast||!window.cast?.framework)return;
  try{
    castCtx=cast.framework.CastContext.getInstance();
    castCtx.setOptions({receiverApplicationId:chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,autoJoinPolicy:chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED});
    castCtx.addEventListener(cast.framework.CastContextEventType.SESSION_STATE_CHANGED,e=>{
      const ok=[cast.framework.SessionState.SESSION_STARTED,cast.framework.SessionState.SESSION_RESUMED].includes(e.sessionState);
      isCasting=ok;
      const btn=document.getElementById("btn-cast");
      if(btn){btn.disabled=false;btn.classList.toggle("active",ok);}
      if(ok&&S.playing)castMedia(streamUrl(S.playing.item,S.playing.type),S.playing.name);
    });
    const btn=document.getElementById("btn-cast");if(btn)btn.disabled=false;
  }catch(e){console.warn("Cast init:",e);}
}
function toggleCast(){
  if(!castCtx){alert("Cast disponível apenas no Chrome com Chromecast na rede.");return;}
  isCasting?castCtx.endCurrentSession(true):castCtx.requestSession().catch(()=>{});
}
function castMedia(url,title){
  try{
    const session=castCtx?.getCurrentSession();if(!session)return;
    const mi=new chrome.cast.media.MediaInfo(url,"application/x-mpegurl");
    mi.metadata=new chrome.cast.media.GenericMediaMetadata();mi.metadata.title=title||"MouseStream";
    session.loadMedia(new chrome.cast.media.LoadRequest(mi)).catch(()=>{});
  }catch(e){}
}

// ══════════ AIRPLAY ══════════
function initAirPlay(){
  const v=document.getElementById("vid");if(!v)return;
  if(window.WebKitPlaybackTargetAvailabilityEvent){
    v.addEventListener("webkitplaybacktargetavailabilitychanged",e=>{
      const btn=document.getElementById("btn-airplay");
      if(btn)btn.style.display=e.availability==="available"?"flex":"none";
    });
  }
}
function toggleAirPlay(){
  const v=document.getElementById("vid");
  if(v?.webkitShowPlaybackTargetPicker)v.webkitShowPlaybackTargetPicker();
  else alert("AirPlay disponível no Safari com Apple TV na rede.");
}

// ══════════ REFRESH / SAIR ══════════
async function refreshData(){
  const btn=document.querySelector(".btn-refresh");if(btn)btn.classList.add("spin-it");
  if(S.mode==="xtream"){
    try{await dbSet("ms_list_"+S.user+"_"+S.server,null);}catch(e){}
    await fetchXtream();
  } else if(S.mode==="m3u"){
    try{const r=await fetch(S.m3uUrl);const t=await r.text();parseM3U(t);renderAll();toast("Lista atualizada ✓");}
    catch(e){toast("Erro ao atualizar");}
  }
  if(btn)btn.classList.remove("spin-it");
}
function doSair(){
  if(!confirm("Sair da conta?"))return;
  stopEPG();const v=document.getElementById("vid");v.pause();v.src="";
  if(HLS){HLS.destroy();HLS=null;}
  document.getElementById("sc-player").className="";
  document.getElementById("sc-main").style.display="none";
  document.getElementById("sc-login").style.display="flex";
  stopPositionTracker();closeMV();clearTimeout(_reconnectTimer);_reconnectAttempts=0;
  Object.assign(S,{server:"",user:"",pass:"",m3uUrl:"",m3uName:"",mode:"",channels:[],movies:[],series:[],chCats:[],movCats:[],serCats:[],playing:null,tab:"home",selCat:"",expiry:null,maxCons:null,epgData:{},tmdbTop10:[],tmdbLoaded:false,watchTotals:{}});
  _epgFull={};
  ["x-url","x-usr","x-pwd","m-url","m-name"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
}

// ══════════ TOAST / UTILS ══════════
function toast(msg){const el=document.getElementById("toast");el.textContent=msg;el.className="toast show";clearTimeout(el._t);el._t=setTimeout(()=>el.className="toast",2500);}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}

// ══════════ KEYBOARD ══════════
document.addEventListener("keydown",e=>{
  if(document.getElementById("sc-player").className==="open"){
    if(e.key==="Escape")closePl();
    if(e.key===" "){e.preventDefault();togglePlay();}
    if(e.key==="f"||e.key==="F")goFs();
  }
  if(e.key==="Escape")document.getElementById("modal-bg").className="";
});
[["x-url","x-usr"],["x-usr","x-pwd"],["x-pwd",null]].forEach(([f,t])=>{
  document.getElementById(f)?.addEventListener("keydown",e=>{if(e.key==="Enter"){t?document.getElementById(t)?.focus():loginXt();}});
});
document.getElementById("m-url")?.addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("m-name")?.focus();});
document.getElementById("m-name")?.addEventListener("keydown",e=>{if(e.key==="Enter")loginM3U();});
</script>
