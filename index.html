<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MousePlay</title>
<!-- Favicon emoji camundongo -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐭</text></svg>"/>
<meta name="apple-mobile-web-app-title" content="MousePlay">
<meta name="application-name" content="MousePlay">
<!-- Scripts externos — carregados com tratamento de erro para iOS/Safari -->
<script>
(function(){
  // HLS.js — carrega em todos os browsers
  function loadHLS(){
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js';
    s.crossOrigin='anonymous';
    s.onerror=function(){
      // Fallback: define Hls vazio pra não quebrar o resto
      window.Hls={isSupported:function(){return false;},Events:{},ErrorTypes:{}};
      console.warn('[MousePlay] HLS.js não carregou — usando player nativo.');
    };
    document.head.appendChild(s);
  }

  // Google Cast SDK — SOMENTE Chrome desktop
  function loadCast(){
    var ua=navigator.userAgent;
    var isChrome=/Chrome\//.test(ua) && !/Chromium|Edg\/|OPR\/|SamsungBrowser|YaBrowser/.test(ua);
    var isIOS=/iPhone|iPad|iPod/.test(ua);
    var isSafari=/Safari\//.test(ua) && !/Chrome/.test(ua);
    if(isIOS || isSafari || !isChrome) return; // pula no iOS/Safari
    var s=document.createElement('script');
    s.src='https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1';
    s.onerror=function(){console.warn('[MousePlay] Cast SDK indisponível.');};
    document.head.appendChild(s);
  }

  // Google Fonts — carrega de forma não bloqueante
  function loadFonts(){
    var l=document.createElement('link');
    l.rel='stylesheet';
    l.href='https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap';
    l.onerror=function(){/* usa system font como fallback */};
    document.head.appendChild(l);
  }

  loadHLS();
  loadCast();
  loadFonts();
})();
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080c10;
  --s1:#0f1318;
  --s2:#161b22;
  --s3:#1e2530;
  --acc:#00c2ff;
  --acc2:#0077ff;
  --red:#ff3b5c;
  --txt:#e8edf2;
  --mut:#5a6478;
  --brd:#1e2530;
  --sidebar:220px;
  --header:56px;
}
body{background:var(--bg);color:var(--txt);font-family:'Outfit',ui-sans-serif,system-ui,-apple-system,sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}

/* ══════════════ LOGIN ══════════════ */
#sc-login{
  display:flex;align-items:center;justify-content:center;min-height:100vh;
  position:relative;overflow:hidden;
  background:#07080a;
}

/* Fundo cinematográfico */
#sc-login::before{
  content:'';
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,194,255,.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 20% 80%, rgba(0,80,160,.08) 0%, transparent 50%),
    radial-gradient(ellipse 30% 30% at 80% 70%, rgba(0,40,80,.06) 0%, transparent 50%);
  pointer-events:none;
}

/* Grade de linhas sutil estilo sala de cinema */
#sc-login::after{
  content:'';
  position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 5px,
      rgba(255,255,255,.018) 5px,
      rgba(255,255,255,.018) 6px
    );
  pointer-events:none;
}

/* Tiras de filme nos cantos */
.film-strip{
  position:absolute;
  display:flex;flex-direction:column;gap:3px;
  pointer-events:none;opacity:.18;
}
.film-strip-left{left:0;top:0;bottom:0;width:40px;
  background:repeating-linear-gradient(
    180deg,
    #111 0px, #111 28px,
    #000 28px, #000 34px,
    #111 34px, #111 62px,
    #000 62px, #000 68px
  );
  border-right:2px solid #222;
}
.film-strip-left::before,.film-strip-left::after{
  content:'';position:absolute;left:6px;right:6px;
  background:repeating-linear-gradient(
    180deg,
    transparent 0px, transparent 18px,
    rgba(255,255,255,.08) 18px, rgba(255,255,255,.08) 20px,
    transparent 20px, transparent 38px,
    rgba(255,255,255,.08) 38px, rgba(255,255,255,.08) 40px
  );
  top:0;bottom:0;
}
.film-strip-right{right:0;top:0;bottom:0;width:40px;
  background:repeating-linear-gradient(
    180deg,
    #111 0px, #111 28px,
    #000 28px, #000 34px,
    #111 34px, #111 62px,
    #000 62px, #000 68px
  );
  border-left:2px solid #222;
}

/* Raio de luz sutil vindo de cima — estilo projetor */
.projector-ray{
  position:absolute;
  top:0;left:50%;transform:translateX(-50%);
  width:300px;height:60%;
  background:linear-gradient(
    180deg,
    rgba(255,250,230,.025) 0%,
    rgba(255,250,230,.01) 40%,
    transparent 100%
  );
  clip-path:polygon(35% 0%, 65% 0%, 100% 100%, 0% 100%);
  pointer-events:none;
}

/* Partículas de poeira no ar — estilo cinema */
@keyframes dust{
  0%{transform:translateY(0) translateX(0);opacity:0}
  10%{opacity:1}
  90%{opacity:.5}
  100%{transform:translateY(-80vh) translateX(20px);opacity:0}
}
.dust{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;pointer-events:none}
.dust:nth-child(1){left:48%;animation:dust 8s 0s infinite linear;opacity:.3}
.dust:nth-child(2){left:52%;animation:dust 11s 2s infinite linear;opacity:.2;width:1px;height:1px}
.dust:nth-child(3){left:50%;animation:dust 9s 4s infinite linear;opacity:.25}
.dust:nth-child(4){left:46%;animation:dust 13s 1s infinite linear;opacity:.15;width:1px;height:1px}
.dust:nth-child(5){left:54%;animation:dust 10s 6s infinite linear;opacity:.2}

.login-wrap{width:100%;max-width:380px;padding:0 20px;position:relative;z-index:1}
.login-logo{font-size:42px;font-weight:800;letter-spacing:-1px;margin-bottom:2px;
  background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 18px rgba(0,194,255,.25))}
.login-sub{font-size:12px;color:var(--mut);letter-spacing:2px;text-transform:uppercase;margin-bottom:32px}
.card{background:rgba(15,19,24,.95);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:28px;
  box-shadow:0 24px 60px rgba(0,0,0,.6);}
.lbl{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;display:block}
.inp{width:100%;background:var(--s2);border:1px solid var(--brd);border-radius:8px;padding:10px 14px;
  color:var(--txt);font-family:'Outfit',sans-serif;font-size:14px;outline:none;margin-bottom:12px}
.inp:focus{border-color:var(--acc)}
.inp::placeholder{color:var(--mut)}
.btn-connect{width:100%;background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:8px;
  padding:12px;color:#000;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}
.btn-connect:hover{opacity:.9}
.btn-connect:disabled{background:var(--s3);color:var(--mut);cursor:not-allowed}
.err-box{background:rgba(255,59,92,.08);border:1px solid rgba(255,59,92,.2);border-radius:8px;
  padding:10px 14px;color:var(--red);font-size:13px;margin-top:12px;display:none}
.spin{width:15px;height:15px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ══════════════ PROFILES ══════════════ */
#sc-profiles{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
.prof-title{font-size:13px;color:var(--mut);letter-spacing:3px;text-transform:uppercase;margin-bottom:32px}
.prof-grid{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.pcard{display:flex;flex-direction:column;align-items:center;gap:10px;padding:20px 24px;
  background:var(--s1);border:1px solid var(--brd);border-radius:12px;cursor:pointer;min-width:96px;transition:border-color .15s}
.pcard:hover{border-color:var(--acc)}
.pcard-av{width:52px;height:52px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:24px}
.pcard-name{font-size:13px;font-weight:500}
.pcard-add{border-style:dashed;color:var(--mut)}
.pcard-add:hover{color:var(--txt);border-color:var(--mut)}

/* ══════════════ APP SHELL ══════════════ */
#sc-main{display:none;min-height:100vh}

/* Header */
.hdr{position:fixed;top:0;left:0;right:0;height:var(--header);background:var(--s1);
  border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100}
.hdr-logo{font-size:20px;font-weight:800;letter-spacing:-0.5px;
  background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  white-space:nowrap;margin-right:4px}

/* Unified search */
.search-wrap{flex:1;max-width:480px;position:relative}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--mut);font-size:15px;pointer-events:none}
.search-inp{width:100%;background:var(--s2);border:1px solid var(--brd);border-radius:22px;
  padding:8px 14px 8px 36px;color:var(--txt);font-family:'Outfit',sans-serif;font-size:13px;outline:none}
.search-inp:focus{border-color:var(--acc)}
.search-inp::placeholder{color:var(--mut)}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;
  color:var(--mut);cursor:pointer;font-size:16px;display:none;padding:2px 4px}
.search-clear.vis{display:block}

/* Search results dropdown */
.search-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--s1);
  border:1px solid var(--brd);border-radius:12px;max-height:400px;overflow-y:auto;display:none;z-index:200;
  box-shadow:0 8px 32px rgba(0,0,0,.5)}
.search-results.open{display:block}
.sr-section{padding:8px 0}
.sr-label{font-size:10px;color:var(--mut);font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:4px 14px 6px}
.sr-item{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer}
.sr-item:hover{background:var(--s2)}
.sr-thumb{width:34px;height:34px;border-radius:5px;background:var(--s2);display:flex;align-items:center;
  justify-content:center;flex-shrink:0;overflow:hidden}
.sr-thumb img{width:100%;height:100%;object-fit:cover}
.sr-info{flex:1;min-width:0}
.sr-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-meta{font-size:11px;color:var(--mut)}
.sr-type{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:700;flex-shrink:0}
.sr-type.ch{background:rgba(255,59,92,.15);color:var(--red)}
.sr-type.mov{background:rgba(0,194,255,.1);color:var(--acc)}
.sr-type.ser{background:rgba(0,119,255,.1);color:var(--acc2)}
.sr-empty{padding:24px;text-align:center;color:var(--mut);font-size:13px}
.sr-divider{height:1px;background:var(--brd);margin:0 14px}

.hdr-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.hdr-btn{background:none;border:none;color:var(--mut);width:36px;height:36px;border-radius:8px;
  cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.hdr-btn:hover{background:var(--s2);color:var(--txt)}
.prof-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));
  display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;border:none}

/* Layout */
.app-body{display:flex;padding-top:var(--header);min-height:100vh}

/* Sidebar */
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--s1);border-right:1px solid var(--brd);
  position:fixed;top:var(--header);bottom:0;left:0;overflow-y:auto;z-index:50;display:flex;flex-direction:column}
.sb-section{padding:12px 8px}
.sb-section-label{font-size:10px;color:var(--mut);font-weight:700;letter-spacing:2px;text-transform:uppercase;
  padding:4px 8px 8px}
.sb-btn{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;color:var(--mut);
  font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;padding:8px 10px;
  border-radius:8px;text-align:left;transition:all .15s}
.sb-btn:hover{color:var(--txt);background:var(--s2)}
.sb-btn.on{color:var(--acc);background:rgba(0,194,255,.08)}
.sb-btn .ico{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sb-divider{height:1px;background:var(--brd);margin:4px 8px}
.sb-cats{padding:0 8px 12px}
.sb-cat{display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:none;
  color:var(--mut);font-family:'Outfit',sans-serif;font-size:12px;cursor:pointer;padding:6px 10px;
  border-radius:6px;text-align:left}
.sb-cat:hover{color:var(--txt);background:var(--s2)}
.sb-cat.on{color:var(--acc)}
.sb-cat-count{font-size:10px;background:var(--s2);padding:1px 6px;border-radius:8px}

/* Main content */
.main{flex:1;margin-left:var(--sidebar);padding:20px 20px 40px;min-width:0}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:14px;color:var(--mut)}
.loading .spin{width:28px;height:28px;border-color:rgba(0,194,255,.2);border-top-color:var(--acc)}

/* Section */
.sec{margin-bottom:28px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mut)}
.sec-count{font-size:12px;color:var(--mut)}
.sec-more{font-size:12px;color:var(--acc);background:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif}

/* Channel list */
.ch-list{display:flex;flex-direction:column;gap:6px}
.ch-row{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--s1);
  border:1px solid var(--brd);border-radius:10px;cursor:pointer;transition:border-color .15s}
.ch-row:hover{border-color:var(--acc)}
.ch-num{font-size:11px;color:var(--mut);width:28px;text-align:right;flex-shrink:0}
.ch-logo{width:38px;height:38px;border-radius:7px;background:var(--s2);display:flex;align-items:center;
  justify-content:center;flex-shrink:0;overflow:hidden}
.ch-logo img{width:100%;height:100%;object-fit:contain}
.ch-logo-fb{font-size:12px;font-weight:700;color:var(--mut);text-align:center;padding:2px;line-height:1.2}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-cat{font-size:11px;color:var(--mut);margin-top:1px}
.live-pill{font-size:9px;background:var(--red);color:#fff;padding:2px 6px;border-radius:3px;
  font-weight:700;letter-spacing:.5px;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.fav-btn{background:none;border:none;color:var(--mut);font-size:16px;cursor:pointer;padding:4px;flex-shrink:0}
.fav-btn:hover{color:#f5c518}
.fav-btn.on{color:#f5c518}

/* Media grid */
.med-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:12px}
.med-card{cursor:pointer}
.med-card:hover .poster{border-color:var(--acc);transform:translateY(-2px)}
.poster{aspect-ratio:2/3;background:var(--s1);border:1px solid var(--brd);border-radius:9px;
  display:flex;align-items:center;justify-content:center;margin-bottom:7px;position:relative;
  overflow:hidden;transition:border-color .15s,transform .15s}
.poster img{width:100%;height:100%;object-fit:cover}
.poster-fb{font-size:40px}
.rating-badge{position:absolute;top:5px;right:5px;background:rgba(0,0,0,.85);color:#f5c518;
  font-size:10px;font-weight:700;padding:2px 5px;border-radius:3px}
.fav-badge{position:absolute;top:5px;left:5px;background:none;border:none;font-size:15px;
  cursor:pointer;color:rgba(255,255,255,.4);text-shadow:0 1px 3px rgba(0,0,0,.8)}
.fav-badge.on{color:#f5c518}
.med-title{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.med-sub{font-size:11px;color:var(--mut);margin-top:1px}

/* History chips */
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--s1);border:1px solid var(--brd);
  border-radius:14px;padding:5px 12px;font-size:12px;cursor:pointer}
.chip:hover{border-color:var(--acc)}
.chip-t{color:var(--mut);font-size:10px}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--mut)}
.empty-ico{font-size:36px;margin-bottom:10px}

/* ══════════════ MODAL ══════════════ */
#modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;align-items:center;justify-content:center}
#modal-bg.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--brd);border-radius:14px;padding:0;
  width:520px;max-width:94vw;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.modal-poster{width:100%;height:180px;object-fit:cover;display:block}
.modal-body{padding:22px 24px;overflow-y:auto}
.modal-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
.modal-title{font-size:20px;font-weight:700;line-height:1.3}
.modal-close{background:none;border:none;color:var(--mut);font-size:20px;cursor:pointer;flex-shrink:0;line-height:1}
.modal-close:hover{color:var(--txt)}
.modal-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.mtag{background:var(--s2);padding:3px 9px;border-radius:5px;font-size:11px;color:var(--mut)}
.modal-plot{font-size:13px;color:var(--mut);line-height:1.65;margin-bottom:18px}
.modal-acts{display:flex;gap:9px}
.btn-play{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#000;border:none;
  border-radius:8px;padding:11px 24px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;flex:1}
.btn-play:hover{opacity:.9}
.btn-fav-m{background:var(--s2);color:var(--txt);border:1px solid var(--brd);border-radius:8px;
  padding:11px 20px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.btn-fav-m:hover{border-color:var(--mut)}
.btn-fav-m.on{color:#f5c518;border-color:#f5c518}
.epg-block{background:var(--s2);border-radius:9px;padding:13px;margin-bottom:14px;border-left:3px solid var(--red)}
.epg-live{font-size:10px;color:var(--red);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.epg-show{font-size:14px;font-weight:600}

/* ══════════════ PLAYER ══════════════ */
#sc-player{display:none;position:fixed;inset:0;background:#000;z-index:900;flex-direction:column}
#sc-player.open{display:flex}
#vid{width:100%;flex:1;background:#000;display:block;min-height:0}
.pl-bar{background:#0a0a0a;border-top:1px solid #1a1a1a;padding:12px 20px;flex-shrink:0}
.pl-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pl-name{font-size:16px;font-weight:700}
.pl-sub{font-size:12px;color:var(--mut)}
.pl-err{color:var(--red);font-size:12px;margin-top:4px}
.pl-ctrls{display:flex;align-items:center;gap:10px}
.pc{background:var(--s2);border:none;color:var(--txt);width:38px;height:38px;border-radius:50%;
  font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pc:hover{background:var(--s3)}
.pc.main{width:46px;height:46px;font-size:20px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#000}
.pc.main:hover{opacity:.9}
.vol-wrap{display:flex;align-items:center;gap:6px}
.vol-ico{font-size:14px;color:var(--mut)}
.vol{width:72px;accent-color:var(--acc);cursor:pointer}
.sp{flex:1}
.quality-btn{background:var(--s2);border:1px solid var(--brd);border-radius:5px;color:var(--mut);
  font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;padding:4px 9px;cursor:pointer}
.quality-btn:hover{color:var(--txt)}

/* Cast / PiP / AirPlay */
.cast-bar{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.cast-btn{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--brd);

<script>
// ── Device ID (gerado antes do state) ──
function getDeviceIdEarly(){
  let id=localStorage.getItem("nx_device_id");
  if(!id){
    // Gera ID único estilo MAC-like: XX:XX:XX:XX:XX:XX
    const hex=()=>Math.floor(Math.random()*256).toString(16).padStart(2,"0").toUpperCase();
    id=[hex(),hex(),hex(),hex(),hex(),hex()].join(":");
    localStorage.setItem("nx_device_id",id);
  }
  return id;
}

// ══════════ STATE ══════════
const S={
  server:"",user:"",pass:"",
  profile:null,
  tab:"home",
  selCat:"",
  favorites:[],
  history:[],
  positions:{},
  playing:null,
  channels:[],movies:[],series:[],
  chCats:[],movCats:[],serCats:[],
  _virtArr:null,_virtOffset:0,
  // Account info
  expiry:null,
  maxCons:null,
  deviceId: getDeviceIdEarly(),
  pinnedCats:{}, // { "pins_canais_user": ["Esportes","Globo"] }
};
const PROFILES=[
  {id:1,name:"Principal",av:"👤"},
  {id:2,name:"Kids",av:"🧒"},
  {id:3,name:"Convidado",av:"🎭"},
];
let hls=null;

// ══════════ FIREBASE PANEL INTEGRATION ══════════
// Cole aqui as mesmas credenciais do painel
const FIREBASE_ENABLED = false; // 👈 mude para true após configurar
const FB_CONFIG = {
  apiKey:      "COLE_SUA_API_KEY",
  authDomain:  "COLE_SEU_PROJECT.firebaseapp.com",
  databaseURL: "https://COLE_SEU_PROJECT-default-rtdb.firebaseio.com",
  projectId:   "COLE_SEU_PROJECT",
};

let fbApp=null, fbDb=null, fbDeviceId=null;

function getDeviceId(){
  let id=localStorage.getItem("nx_device_id");
  if(!id){
    id="dev_"+Math.random().toString(36).slice(2,10)+"_"+Date.now().toString(36);
    localStorage.setItem("nx_device_id",id);
  }
  return id;
}

function getDeviceName(){
  const ua=navigator.userAgent;
  if(/FireTV|AFT/i.test(ua)) return "Fire TV";
  if(/Android TV/i.test(ua)) return "Android TV";
  if(/Android/i.test(ua))    return "Android";
  if(/iPhone|iPad/i.test(ua))return "iOS";
  if(/Windows/i.test(ua))    return "Windows";
  if(/Mac/i.test(ua))        return "Mac";
  return "Dispositivo";
}

async function initFirebase(){
  if(!FIREBASE_ENABLED) return;
  try{
    const {initializeApp}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const {getDatabase,ref,set,onValue,serverTimestamp}=
      await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");

    fbApp=initializeApp(FB_CONFIG,"nexstream-client");
    fbDb=getDatabase(fbApp);
    fbDeviceId=getDeviceId();

    // Register this device
    await set(ref(fbDb,`devices/${fbDeviceId}`),{
      name: getDeviceName(),
      platform: navigator.userAgent.slice(0,80),
      lastSeen: Date.now(),
    });

    // Update lastSeen every 5 min
    setInterval(()=>{
      set(ref(fbDb,`devices/${fbDeviceId}/lastSeen`),Date.now());
    },300000);

    // Listen for config pushed from panel
    onValue(ref(fbDb,`devices/${fbDeviceId}/config`),(snap)=>{
      const cfg=snap.val();
      if(!cfg) return;
      applyRemoteConfig(cfg);
    });

    // Listen for pendingReload flag
    onValue(ref(fbDb,`devices/${fbDeviceId}/pendingReload`),(snap)=>{
      if(snap.val()===true){
        set(ref(fbDb,`devices/${fbDeviceId}/pendingReload`),false);
        // If already logged in, reload list with new config
        if(S.server) loadAll();
      }
    });

    console.log("[MousePlay] Firebase conectado. Device ID:",fbDeviceId);
  }catch(e){
    console.warn("[MousePlay] Firebase init falhou:",e.message);
  }
}

function applyRemoteConfig(cfg){
  if(!cfg.server&&!cfg.m3u) return;
  // Show notification banner
  showRemoteBanner(cfg);
}

function showRemoteBanner(cfg){
  let b=document.getElementById("remote-banner");
  if(!b){
    b=document.createElement("div");b.id="remote-banner";
    b.style.cssText="position:fixed;bottom:20px;right:20px;background:var(--s1);border:1px solid var(--acc);"+
      "border-radius:10px;padding:14px 18px;z-index:999;max-width:300px;box-shadow:0 4px 20px rgba(0,0,0,.5)";
    document.body.appendChild(b);
  }
  b.innerHTML=`
    <div style="font-size:11px;color:var(--acc);font-weight:700;letter-spacing:1px;margin-bottom:6px">📡 NOVA CONFIG RECEBIDA</div>
    <div style="font-size:13px;font-weight:600;margin-bottom:4px">${cfg.profileName||"Lista atualizada"}</div>
    <div style="font-size:11px;color:var(--mut);margin-bottom:12px">${cfg.server||cfg.m3u||""}</div>
    <div style="display:flex;gap:8px">
      <button onclick="acceptRemoteConfig()" style="flex:1;background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:6px;padding:8px;color:#000;font-weight:700;font-size:12px;cursor:pointer">✓ Aplicar</button>
      <button onclick="document.getElementById('remote-banner').remove()" style="background:var(--s2);border:1px solid var(--brd);border-radius:6px;padding:8px 12px;color:var(--mut);font-size:12px;cursor:pointer">✕</button>
    </div>`;
  window._pendingRemoteConfig=cfg;
}

window.acceptRemoteConfig=function(){
  const cfg=window._pendingRemoteConfig;
  if(!cfg) return;
  document.getElementById("remote-banner")?.remove();
  if(cfg.type==="xtream"||cfg.server){
    S.server=cfg.server;
    S.user=cfg.username;
    S.pass=cfg.password;
    if(document.getElementById("sc-main").style.display!=="none"){
      loadAll();
    } else {
      // Pre-fill login and go straight to profiles
      document.getElementById("i-url").value=cfg.server||"";
      document.getElementById("i-usr").value=cfg.username||"";
      document.getElementById("i-pwd").value=cfg.password||"";
    }
  }
};


let castSession = null;
let castContext = null;
let isCasting = false;
const CAST_APP_ID = "CC1AD845"; // Default Media Receiver

function initCast() {
  if (!window.chrome || !window.chrome.cast || !window.cast?.framework) return;
  try {
    castContext = cast.framework.CastContext.getInstance();
    castContext.setOptions({
      receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
      autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED,
    });
    castContext.addEventListener(
      cast.framework.CastContextEventType.SESSION_STATE_CHANGED,
      (e) => {
        const s = e.sessionState;
        const btn = document.getElementById("btn-cast");
        const status = document.getElementById("cast-status");
        if (s === cast.framework.SessionState.SESSION_STARTED ||
            s === cast.framework.SessionState.SESSION_RESUMED) {
          isCasting = true;
          btn?.classList.add("active");
          if(status){status.textContent="📡 Transmitindo...";status.classList.add("vis");}
          if (S.playing) castMedia(streamUrl(S.playing.sid, S.playing.type), S.playing.name);
        } else if (s === cast.framework.SessionState.SESSION_ENDED) {
          isCasting = false;
          btn?.classList.remove("active");
          status?.classList.remove("vis");
          document.getElementById("vid")?.play().catch(()=>{});
        }
      }
    );
    const btn = document.getElementById("btn-cast");
    if (btn) btn.disabled = false;
  } catch (e) { console.warn("Cast init failed:", e); }
}

function castMedia(url, title) {
  if (!castContext || !window.chrome?.cast) return;
  try{
    const session = castContext.getCurrentSession();
    if (!session) return;
    const mediaInfo = new chrome.cast.media.MediaInfo(url, "application/x-mpegurl");
    mediaInfo.metadata = new chrome.cast.media.GenericMediaMetadata();
    mediaInfo.metadata.title = title || "MousePlay";
    session.loadMedia(new chrome.cast.media.LoadRequest(mediaInfo)).catch(()=>{});
  }catch(e){console.warn("Cast media error:",e);}
}

function toggleCast() {
  if (!castContext || !window.cast) {
    alert("Google Cast disponível apenas no Chrome para desktop com Chromecast na rede.");
    return;
  }
  if (isCasting) castContext.endCurrentSession(true);
  else castContext.requestSession().catch(e => {
    if (e.code !== "cancel") console.warn("Cast request failed:", e);
  });
}

function playStream(url){
  const v=document.getElementById("vid");
  document.getElementById("pl-err").textContent="";
  if(hls){hls.destroy();hls=null;}
  if(!url||url==="#"){document.getElementById("pl-err").textContent="⚠ URL indisponível.";return;}

  const tryNative=(src)=>{v.src=src;v.load();v.play().catch(()=>{});};

  if(url.includes(".m3u8") && Hls.isSupported()){
    hls=new Hls({
      maxBufferLength:15,
      maxMaxBufferLength:30,
      maxBufferHole:0.5,
      lowLatencyMode:false,
      enableWorker:true,
      startLevel:-1,
    });
    hls.loadSource(url);
    hls.attachMedia(v);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>v.play().catch(()=>{}));
    hls.on(Hls.Events.ERROR,(e,d)=>{
      if(d.fatal){
        if(d.type===Hls.ErrorTypes.NETWORK_ERROR){hls.startLoad();}
        else{document.getElementById("pl-err").textContent="⚠ Erro no stream. Tente outro canal.";}
      }
    });
  } else if(url.includes(".m3u8") && v.canPlayType("application/vnd.apple.mpegurl")){
    tryNative(url);
  } else {
    tryNative(url);
  }
}

const WORKER_URL = "https://mouseplay-proxy.thiagogaldinozicao.workers.dev";

function api(action,extra=""){
  return `${S.server}/player_api.php?username=${S.user}&password=${S.pass}&action=${action}${extra||""}`;
}

function streamUrl(id,type){
  // Streams vão SEMPRE direto pro servidor — sem proxy
  if(type==="channel") return `${S.server}/live/${S.user}/${S.pass}/${id}.m3u8`;
  if(type==="movie")   return `${S.server}/movie/${S.user}/${S.pass}/${id}.mp4`;
  return `${S.server}/series/${S.user}/${S.pass}/${id}.mp4`;
}

async function apiFetch(action,extra=""){
  const url=api(action,extra);
  // Tenta: 1) Worker, 2) direto
  const attempts=[
    WORKER_URL+"?url="+encodeURIComponent(url),
    url,
  ];
  let lastErr=null;
  for(let i=0;i<attempts.length;i++){
    try{
      const ctrl=new AbortController();
      const timer=setTimeout(()=>ctrl.abort(),10000);
      const r=await fetch(attempts[i],{signal:ctrl.signal});
      clearTimeout(timer);
      if(!r.ok) throw new Error("HTTP "+r.status);
      return await r.json();
    }catch(e){
      lastErr=e;
    }
  }
  throw lastErr||new Error("Falha na conexão");
}

async function tryServer(server,usr,pwd){
  const url=`${server}/player_api.php?username=${encodeURIComponent(usr)}&password=${encodeURIComponent(pwd)}&action=authenticate`;
  // Tenta via Worker primeiro, depois direto
  const attempts=[
    WORKER_URL+"?url="+encodeURIComponent(url),
    url,
  ];
  for(const fetchUrl of attempts){
    try{
      const ctrl=new AbortController();
      const timer=setTimeout(()=>ctrl.abort(),8000);
      const r=await fetch(fetchUrl,{signal:ctrl.signal});
      clearTimeout(timer);
      if(!r.ok) continue;
      const d=await r.json();
      if(d?.user_info?.auth===1||d?.user_info?.username) return d;
    }catch(e){ continue; }
  }
  return null;
}

// ══════════ CACHE (IndexedDB) ══════════
const DB_NAME="nexstream_cache";
const DB_VER=1;
let db=null;

function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains("data")) d.createObjectStore("data");
    };
    r.onsuccess=e=>{db=e.target.result;res(db);};
    r.onerror=()=>rej(r.error);
  });
}
function dbGet(key){
  return new Promise((res,rej)=>{
    const tx=db.transaction("data","readonly");
    const r=tx.objectStore("data").get(key);
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
}
function dbSet(key,val){
  return new Promise((res,rej)=>{
    const tx=db.transaction("data","readwrite");
    const r=tx.objectStore("data").put(val,key);
    r.onsuccess=()=>res();
    r.onerror=()=>rej(r.error);
  });
}

async function loadAll(){
  showLoading("Verificando cache...");
  await openDB();

  // Load state (favs, history, positions)
  const saved=await dbGet("state_"+S.user).catch(()=>null);
  if(saved){
    S.favorites=saved.favorites||[];
    S.history=saved.history||[];
    S.positions=saved.positions||{};
    S.pinnedCats=saved.pinnedCats||{};
  }

  // Try cache first — show instantly
  const cacheKey="list_"+S.user+"_"+S.server;
  const cached=await dbGet(cacheKey).catch(()=>null);
  if(cached&&cached.ts&&(Date.now()-cached.ts)<3600000){
    // Cache is fresh (< 1h) — load instantly
    applyData(cached.data);
    showLoading("Atualizando em segundo plano...",true);
    // Refresh in background silently
    fetchAndCache(cacheKey).catch(()=>{});
    return;
  }

  // No cache or stale — fetch fresh
  showLoading("Carregando lista...");
  await fetchAndCache(cacheKey);
}

async function fetchAndCache(cacheKey){
  try{
    const[chs,movs,sers]=await Promise.all([
      apiFetch("get_live_streams"),
      apiFetch("get_vod_streams"),

      movies:Array.isArray(movs)?movs:[],

    if(!S.channels.length){
      document.getElementById("main-content").innerHTML=
        `<div class="empty"><div class="empty-ico">⚠️</div>Erro ao carregar.<br><small>${e.message}</small></div>`;

// ══════════ VIRTUALIZATION ══════════
// Renders only visible items — crucial for lists with 5000+ channels
const VIRT={rowH:58,gridH:0,pageSize:60};

function virtualChList(arr){
  // Simple paging — renders 60 at a time, loads more on scroll
  if(arr.length<=VIRT.pageSize) return chList(arr);
  S._virtArr=arr;
  S._virtOffset=0;
  const wrap=document.createElement("div");
  wrap.id="virt-wrap";
  wrap.innerHTML=chList(arr.slice(0,VIRT.pageSize));
  // Sentinel
  const sentinel=document.createElement("div");
  sentinel.id="virt-sentinel";
  sentinel.style.height="1px";
  wrap.appendChild(sentinel);
  // Observer
  setTimeout(()=>{
    const obs=new IntersectionObserver(entries=>{
      if(entries[0].isIntersecting) loadMoreVirt();
    },{rootMargin:"200px"});
    const s=document.getElementById("virt-sentinel");
    if(s) obs.observe(s);
  },100);
  return wrap.outerHTML;
}

function loadMoreVirt(){
  if(!S._virtArr) return;
  S._virtOffset+=VIRT.pageSize;
  const next=S._virtArr.slice(S._virtOffset,S._virtOffset+VIRT.pageSize);
  if(!next.length) return;
  const wrap=document.getElementById("virt-wrap");
  const sentinel=document.getElementById("virt-sentinel");
  if(!wrap||!sentinel) return;
  const tmp=document.createElement("div");
  tmp.innerHTML=chList(next);
  while(tmp.firstChild) wrap.insertBefore(tmp.firstChild,sentinel);
  if(S._virtOffset+VIRT.pageSize>=S._virtArr.length) sentinel.remove();
}

// Match TMDB title against user's IPTV list (fuzzy name match)
function matchTMDB(tmdbTitle,type){
  const clean=t=>(t||"").toLowerCase()
    .replace(/[:\-–—!?.,'"""''()[\]]/g," ")
    .replace(/\s+/g," ").trim();
  const q=clean(tmdbTitle);
  const arr=type==="movie"?S.movies:S.series;
  // Exact match first
  let found=arr.find(i=>clean(i.name||i.title||"")=== q);
  if(!found){
    // Starts-with match
    found=arr.find(i=>clean(i.name||i.title||"").startsWith(q.slice(0,Math.min(q.length,20))));
  }
  if(!found){
    // Contains match (at least 10 chars of title)
    const short=q.slice(0,Math.max(10,Math.floor(q.length*0.7)));
    found=arr.find(i=>clean(i.name||i.title||"").includes(short));
  }
  return found||null;
}

      <div style="color:var(--mut);font-size:12px;padding:8px 0">Carregando tendências...</div>`;
  }

  // Merge movies + series sorted by popularity
  const items=[];
  S.top10Movies.forEach(t=>{
    const match=matchTMDB(t.title,"movie");
    items.push({tmdb:t,match,type:"movie",title:t.title,poster:t.poster_path,rating:t.vote_average});
  });
  S.top10Series.forEach(t=>{
    const match=matchTMDB(t.name,"series");
    items.push({tmdb:t,match,type:"series",title:t.name,poster:t.poster_path,rating:t.vote_average});
  });
  items.sort((a,b)=>(b.tmdb.popularity||0)-(a.tmdb.popularity||0));
  const top10=items.slice(0,10);
  const matched=top10.filter(i=>i.match).length;

  return `
    <div class="sec-hdr">
      <span class="sec-title">🔥 TOP 10 DA SEMANA</span>
      <span style="font-size:11px;color:var(--mut)">${matched?`✅ ${matched} na sua lista`:""}</span>
    </div>
    <div class="top10-scroll">
      ${top10.map((item,idx)=>{
        const sid=item.match?(item.type==="series"?item.match.series_id:item.match.stream_id):null;
        const poster=item.poster?TMDB_IMG+item.poster:"";
        const hasIt=!!item.match;
        const onclick=hasIt
          ?`openPlayer('${sid}','${item.type}','${esc(item.title)}','')`
          :`showNoMatch('${esc(item.title)}')`;
        return `<div class="top10-card" onclick="${onclick}">
          <div class="top10-poster-img">
            ${poster
              ?`<img src="${poster}" loading="lazy" onerror="this.style.display='none'"/>`
              :`<span class="top10-poster-fb">${item.type==="movie"?"🎬":"📺"}</span>`}
            ${hasIt?`<div class="top10-avail-dot" title="Disponível na sua lista"></div>`:""}
          </div>
          <div class="top10-num">${idx+1}</div>
          <div class="top10-card-title">${esc(item.title)}</div>
          <div class="top10-card-meta">${item.type==="movie"?"Filme":"Série"} · ★ ${(item.rating||0).toFixed(1)}</div>
        </div>`;
      }).join("")}
    </div>`;
}

function togglePin(cat,pinKey){
  if(!S.pinnedCats[pinKey]) S.pinnedCats[pinKey]=[];
  const pins=S.pinnedCats[pinKey];
  if(pins.includes(cat)){
    S.pinnedCats[pinKey]=pins.filter(p=>p!==cat);
    showToast(`"${cat}" removida do topo`);
  } else {
    S.pinnedCats[pinKey]=[cat,...pins];
    showToast(`"${cat}" fixada no topo 📌`);
  }
  saveState();
  buildSidebar();
}

// ══════════ SIDEBAR — estilo Smarters ══════════
function buildSidebar(){
  const isMedia=["canais","filmes","series"].includes(S.tab);
  let cats=[];
  if(S.tab==="canais") cats=S.chCats;
  else if(S.tab==="filmes") cats=S.movCats;
  else if(S.tab==="series") cats=S.serCats;

  const catCount=(cat)=>{
    if(S.tab==="canais") return S.channels.filter(c=>c.category_name===cat).length;
    if(S.tab==="filmes") return S.movies.filter(m=>m.category_name===cat).length;
    if(S.tab==="series") return S.series.filter(s=>s.category_name===cat).length;
    return 0;
  };
  const total=cats.reduce((a,c)=>a+catCount(c),0);

  // Apply pinned order
  const pinKey="pins_"+S.tab+"_"+S.user;
  const pins=S.pinnedCats[pinKey]||[];
  const sortedCats=[
    ...pins.filter(p=>cats.includes(p)),
    ...cats.filter(c=>!pins.includes(c))
  ];

  document.getElementById("sidebar").innerHTML=`
    <div class="sb-section">
      ${TABS.map(t=>`<button class="sb-btn${S.tab===t.id?" on":""}" onclick="setTab('${t.id}')">
        <span class="ico">${t.ico}</span>${t.label}
      </button>`).join("")}
    </div>
    ${isMedia&&sortedCats.length?`
    <div class="sb-divider"></div>
    <div class="sb-cats">
      <div class="sb-search-wrap">
        <input class="sb-search" id="sb-srch" placeholder="🔍 Buscar categoria..."
          oninput="filterSbCats(this.value)" autocomplete="off"/>
      </div>
      <button class="sb-cat${!S.selCat?" on":""}" onclick="setCat('')">
        <span class="sb-cat-name">ALL</span>
        <span class="sb-cat-count">${total}</span>
      </button>
      <div id="sb-cats-list">
        ${sortedCats.map(c=>{
          const isPinned=pins.includes(c);
          return `<button class="sb-cat${S.selCat===c?" on":""}${isPinned?" pinned":""}"
            onclick="setCat('${esc(c)}')">
            ${isPinned?`<span style="font-size:10px;color:var(--acc);margin-right:3px">📌</span>`:""}
            <span class="sb-cat-name">${esc(c)}</span>
            <span class="sb-cat-count">${catCount(c)}</span>
            <button class="pin-btn" title="${isPinned?"Remover do topo":"Fixar no topo"}"
              onclick="event.stopPropagation();togglePin('${esc(c)}','${pinKey}')">
              ${isPinned?"✕":"↑"}
            </button>
          </button>`;
        }).join("")}
      </div>
    </div>`:""}
  `;
}

function filterSbCats(q){

function renderInfoBar(){

    const date=new Date(S.expiry).toLocaleDateString("pt-BR");
    let cls="expiry-ok", label=`${date} (${days}d)`;
    if(days<0){cls="expiry-exp";label=`Expirado em ${date}`;}
    else if(days<30){cls="expiry-warn";label=`${date} (${days}d)`;}
    expiryHtml=`<div class="info-item">📅 Expiração: <b class="${cls}">${label}</b></div>`;
  }
  const maxHtml=S.maxCons?`<div class="info-item">👥 Conexões: <b>${S.maxCons}</b></div>`:"";

async function forceRefresh(){
  const btn=document.getElementById("btn-refresh");
  if(btn){btn.classList.add("spinning");btn.querySelector(".ref-ico").textContent="⟳";}
  // Clear cache for current user
  try{
    await openDB();
    const cacheKey="list_"+S.user+"_"+S.server;
    await dbSet(cacheKey,null);
  }catch(e){}
  // Reload fresh from server
  showLoading("Atualizando lista...");
  await fetchAndCache("list_"+S.user+"_"+S.server);
  if(btn){btn.classList.remove("spinning");btn.querySelector(".ref-ico").textContent="🔄";}
}

// ── Smarters poster grid (5 colunas, cards maiores) ──
function smartersGrid(arr,type){
  if(arr.length>40){
    S._virtArr=arr;S._virtOffset=0;
    const wrap=document.createElement("div");
    wrap.className="smarters-grid";wrap.id="virt-wrap";
    wrap.innerHTML=smartersCards(arr.slice(0,40),type);
    const sentinel=document.createElement("div");
    sentinel.id="virt-sentinel";sentinel.style.height="1px";
    wrap.appendChild(sentinel);
    setTimeout(()=>{
      const obs=new IntersectionObserver(e=>{
        if(e[0].isIntersecting) loadMoreSG(type);
      },{rootMargin:"300px"});
      const s=document.getElementById("virt-sentinel");
      if(s) obs.observe(s);
    },100);
    return wrap.outerHTML;
  }
  return `<div class="smarters-grid">${smartersCards(arr,type)}</div>`;
}
function loadMoreSG(type){
  if(!S._virtArr) return;
  S._virtOffset+=40;
  const next=S._virtArr.slice(S._virtOffset,S._virtOffset+40);
  if(!next.length) return;
  const wrap=document.getElementById("virt-wrap");
  const sentinel=document.getElementById("virt-sentinel");
  if(!wrap||!sentinel) return;
  const tmp=document.createElement("div");
  tmp.innerHTML=smartersCards(next,type);
  while(tmp.firstChild) wrap.insertBefore(tmp.firstChild,sentinel);
  if(S._virtOffset+40>=S._virtArr.length) sentinel.remove();
}
function smartersCards(arr,type){
  return arr.map(m=>{
    const sid=type==="series"?m.series_id:m.stream_id;
    const fk=(type==="series"?"ser_":"mov_")+sid;
    const isFav=S.favorites.includes(fk);
    const cover=m.stream_icon||m.cover||m.backdrop_path||"";
    const rating=parseFloat(m.rating||m.rating_5based||0)||0;
    return `<div class="sc" onclick="openModal(${sid},'${type}')">
      <div class="sc-poster">
        ${cover&&cover.startsWith("http")?
          `<img src="${cover}" loading="lazy" onerror="this.style.display='none'"/>`:
          `<span class="sc-fb">${type==="series"?"📺":"🎬"}</span>`}
        ${rating?`<span class="sc-rating">${rating.toFixed(0)}</span>`:""}
        <button class="sc-fav${isFav?" on":""}" onclick="event.stopPropagation();toggleFav('${fk}')">${isFav?"★":"☆"}</button>
      </div>
      <div class="sc-title">${esc(m.name||m.title||"")}</div>
    </div>`;
  }).join("");
}

// ══════════ SEARCH ══════════
function onSearch(){
  const q=document.getElementById("srch").value.trim().toLowerCase();
  const cl=document.getElementById("srch-clear");
  cl.classList.toggle("vis",q.length>0);
  if(!q){document.getElementById("srch-res").classList.remove("open");return;}
  const MAX=5;
  const chs=S.channels.filter(c=>(c.name||"").toLowerCase().includes(q)).slice(0,MAX);
  const movs=S.movies.filter(m=>(m.name||"").toLowerCase().includes(q)).slice(0,MAX);
  const sers=S.series.filter(s=>(s.name||"").toLowerCase().includes(q)).slice(0,MAX);
  const total=chs.length+movs.length+sers.length;

  if(!total){
    document.getElementById("srch-res").innerHTML=`<div class="sr-empty">Nenhum resultado para "${esc(q)}"</div>`;
    document.getElementById("srch-res").classList.add("open");
    return;
  }

  let html="";
  if(chs.length){
    html+=`<div class="sr-section"><div class="sr-label">📡 Canais</div>
      ${chs.map(c=>`<div class="sr-item" onclick="closeSearch();openModal(${c.stream_id},'channel')">
        <div class="sr-thumb">${c.stream_icon&&c.stream_icon.startsWith("http")?
          `<img src="${c.stream_icon}" loading="lazy" onerror="this.style.display='none'"/>`:
          `<span style="font-size:11px;font-weight:700;color:var(--mut)">${(c.name||"?").substring(0,3)}</span>`}
        </div>
        <div class="sr-info"><div class="sr-name">${esc(c.name)}</div><div class="sr-meta">${esc(c.category_name||"")}</div></div>
        <span class="sr-type ch">LIVE</span>
      </div>`).join("")}
    </div>`;
  }
  if(chs.length&&movs.length) html+=`<div class="sr-divider"></div>`;
  if(movs.length){
    html+=`<div class="sr-section"><div class="sr-label">🎬 Filmes</div>
      ${movs.map(m=>`<div class="sr-item" onclick="closeSearch();openModal(${m.stream_id},'movie')">
        <div class="sr-thumb">${m.stream_icon&&m.stream_icon.startsWith("http")?
          `<img src="${m.stream_icon}" loading="lazy" onerror="this.style.display='none'"/>`:
          `<span style="font-size:18px">🎬</span>`}
        </div>
        <div class="sr-info"><div class="sr-name">${esc(m.name||"")}</div><div class="sr-meta">${m.year||""}</div></div>
        <span class="sr-type mov">FILME</span>
      </div>`).join("")}
    </div>`;
  }
  if((chs.length||movs.length)&&sers.length) html+=`<div class="sr-divider"></div>`;
  if(sers.length){
    html+=`<div class="sr-section"><div class="sr-label">📺 Séries</div>
      ${sers.map(s=>`<div class="sr-item" onclick="closeSearch();openModal(${s.series_id},'series')">
        <div class="sr-thumb">${s.cover&&s.cover.startsWith("http")?
          `<img src="${s.cover}" loading="lazy" onerror="this.style.display='none'"/>`:
          `<span style="font-size:18px">📺</span>`}
        </div>
        <div class="sr-info"><div class="sr-name">${esc(s.name||"")}</div><div class="sr-meta">${s.genre||""}</div></div>
        <span class="sr-type ser">SÉRIE</span>
      </div>`).join("")}
    </div>`;
  }
  document.getElementById("srch-res").innerHTML=html;
  document.getElementById("srch-res").classList.add("open");
}

function showResults(){if(document.getElementById("srch").value.trim()) onSearch();}
function clearSearch(){
  document.getElementById("srch").value="";
  document.getElementById("srch-clear").classList.remove("vis");
  document.getElementById("srch-res").classList.remove("open");
}
function closeSearch(){
  document.getElementById("srch-res").classList.remove("open");
  document.getElementById("srch").value="";
  document.getElementById("srch-clear").classList.remove("vis");
}
document.addEventListener("click",e=>{
  if(!document.querySelector(".search-wrap")?.contains(e.target))
    document.getElementById("srch-res")?.classList.remove("open");
});

// ══════════ FAVORITES ══════════
function toggleFav(fk){
  if(S.favorites.includes(fk)) S.favorites=S.favorites.filter(x=>x!==fk);
  else S.favorites.push(fk);
  saveState();
  const mfav=document.getElementById("mfav");
  if(mfav){const on=S.favorites.includes(fk);mfav.className="btn-fav-m"+(on?" on":"");mfav.textContent=on?"★ Favorito":"☆ Favoritar";}
  updatePlFav();
  if(S.tab==="favoritos") renderAll();
}

// ══════════ MODAL ══════════
function findItem(id,type){
  if(type==="channel") return S.channels.find(c=>String(c.stream_id)===String(id));
  if(type==="movie")   return S.movies.find(m=>String(m.stream_id)===String(id));
  return S.series.find(s=>String(s.series_id)===String(id));
}
function openModal(id,type){
  const item=findItem(id,type);
  if(!item) return;
  const sid=type==="series"?item.series_id:item.stream_id;
  const fk=(type==="channel"?"ch_":type==="movie"?"mov_":"ser_")+sid;
  const isFav=S.favorites.includes(fk);
  const cover=item.stream_icon||item.cover||item.backdrop_path||"";
  const rating=parseFloat(item.rating||item.rating_5based||0)||0;

  let html="";
  if(cover&&cover.startsWith("http")) html+=`<img class="modal-poster" src="${cover}" onerror="this.style.display='none'"/>`;
  html+=`<div class="modal-body">
    <div class="modal-hdr">
      <div class="modal-title">${esc(item.name||item.title||"")}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>`;

  if(type==="channel"){
    html+=`<div class="epg-block"><div class="epg-live">⚡ Ao Vivo</div><div class="epg-show">${esc(item.category_name||"")}</div></div>`;
  } else {
    html+=`<div class="modal-tags">
      ${rating?`<span class="mtag">★ ${rating.toFixed(1)}</span>`:""}
      ${item.genre?`<span class="mtag">${esc(item.genre.split(",")[0])}</span>`:""}
      ${item.year?`<span class="mtag">${item.year}</span>`:""}
      ${item.seasons?`<span class="mtag">${item.seasons} temporadas</span>`:""}
      ${item.category_name?`<span class="mtag">${esc(item.category_name)}</span>`:""}
    </div>`;
    if(item.plot) html+=`<div class="modal-plot">${esc(item.plot)}</div>`;
  }

  html+=`<div class="modal-acts">
    <button class="btn-play" onclick="openPlayer('${sid}','${type}','${esc(item.name||item.title||"")}','${esc(item.category_name||item.genre||"")}')">▶ Assistir</button>
    <button class="btn-fav-m${isFav?" on":""}" id="mfav" onclick="toggleFav('${fk}')">${isFav?"★ Favorito":"☆ Favoritar"}</button>
  </div></div>`;

  document.getElementById("modal-inner").innerHTML=html;
  document.getElementById("modal-bg").classList.add("open");
}
function closeModal(e){
  if(!e||e.target===document.getElementById("modal-bg"))
    document.getElementById("modal-bg").classList.remove("open");
}

// ══════════ PLAYER ══════════
function openPlayer(sid,type,name,sub){
  document.getElementById("modal-bg").classList.remove("open");
  S.playing={sid,type,name,sub};
  const now=new Date();
  const t=now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0");
  S.history=[{sid,type,name,sub,time:t},...S.history.filter(h=>h.sid!==sid)].slice(0,50);
  saveState();
  document.getElementById("pl-name").textContent=name||"";
  document.getElementById("pl-sub").textContent=sub||"";
  document.getElementById("pl-err").textContent="";
  document.getElementById("sc-player").classList.add("open");
  updatePlFav();

  // Resume position (movies/series only, not live)
  const savedPos=(type!=="channel"&&S.positions[sid])||0;
  playStream(streamUrl(sid,type));

  // After stream starts, seek to saved position
  if(savedPos>10){
    const v=document.getElementById("vid");
    const onReady=()=>{
      if(v.duration&&savedPos<v.duration-30){
        v.currentTime=savedPos;
        showResumeBanner(savedPos);
      }
      v.removeEventListener("canplay",onReady);
    };
    v.addEventListener("canplay",onReady);
  }

  // Save position every 5s while playing
  const v=document.getElementById("vid");
  if(v._posInterval) clearInterval(v._posInterval);
  if(type!=="channel"){
    v._posInterval=setInterval(()=>{
      if(!v.paused&&v.currentTime>10){
        S.positions[sid]=Math.floor(v.currentTime);
        saveState();
      }
    },5000);
  }
}

function showResumeBanner(pos){
  const m=Math.floor(pos/60),s=Math.floor(pos%60);
  let b=document.getElementById("resume-banner");
  if(!b){
    b=document.createElement("div");
    b.id="resume-banner";
    b.style.cssText="position:absolute;top:12px;right:12px;background:rgba(0,0,0,.85);border:1px solid var(--acc);border-radius:8px;padding:8px 14px;font-size:12px;color:var(--txt);z-index:10;cursor:pointer";
    document.getElementById("sc-player").appendChild(b);
  }
  b.innerHTML=`▶ Continuando de ${m}:${String(s).padStart(2,"0")} <span style="color:var(--mut);margin-left:6px">✕</span>`;
  b.onclick=()=>b.remove();
  setTimeout(()=>b?.remove(),4000);
}
function togglePlay(){
  const v=document.getElementById("vid");
  const btn=document.getElementById("pl-pp");
  if(v.paused){v.play();btn.textContent="⏸";}
  else{v.pause();btn.textContent="▶";}
}
function setVol(val){document.getElementById("vid").volume=val;}
function goFs(){
  const v=document.getElementById("vid");
  if(v.requestFullscreen) v.requestFullscreen();
  else if(v.webkitRequestFullscreen) v.webkitRequestFullscreen();
}
function closePlayer(){
  const v=document.getElementById("vid");
  // Save final position before closing
  if(S.playing&&S.playing.type!=="channel"&&v.currentTime>10){
    S.positions[S.playing.sid]=Math.floor(v.currentTime);
    saveState();
  }
  if(v._posInterval){clearInterval(v._posInterval);v._posInterval=null;}
  v.pause();v.src="";
  if(hls){hls.destroy();hls=null;}
  document.getElementById("sc-player").classList.remove("open");
  document.getElementById("resume-banner")?.remove();
  S.playing=null;
  if(S.tab==="home"||S.tab==="historico") renderAll();
}
function toggleFavPlayer(){if(S.playing){const fk=(S.playing.type==="channel"?"ch_":S.playing.type==="movie"?"mov_":"ser_")+S.playing.sid;toggleFav(fk);}}
function updatePlFav(){
  const btn=document.getElementById("pl-fav");
  if(!btn||!S.playing) return;
  const fk=(S.playing.type==="channel"?"ch_":S.playing.type==="movie"?"mov_":"ser_")+S.playing.sid;
  btn.textContent=S.favorites.includes(fk)?"★":"☆";
  btn.style.color=S.favorites.includes(fk)?"#f5c518":"";
}

// ══════════ UTILS ══════════
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/'/g,"\\'").replace(/"/g,"&quot;");}
