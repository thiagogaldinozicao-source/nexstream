<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MousePlay - Turbo</title>
<!-- CARREGAMENTO ULTRA RÁPIDO -->
<script src="https://cdnjs.cloudflare.com"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080c10; --s1:#0f1318; --s2:#161b22; --s3:#1e2530;
  --acc:#00c2ff; --acc2:#0077ff; --red:#ff3b5c; --txt:#e8edf2;
  --mut:#5a6478; --brd:#1e2530;
}
body{background:var(--bg);color:var(--txt);font-family:ui-sans-serif,system-ui,sans-serif;overflow:hidden;min-height:100vh}

/* SEU VISUAL ORIGINAL */
#sc-login{display:flex;align-items:center;justify-content:center;min-height:100vh;position:relative;overflow:hidden;background:#07080a;}
#sc-login::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,194,255,.06) 0%, transparent 60%);pointer-events:none;}
.film-strip{position:absolute;display:flex;flex-direction:column;gap:3px;pointer-events:none;opacity:.18;width:40px;top:0;bottom:0;}
.film-strip-left{left:0;background:repeating-linear-gradient(180deg,#111 0px,#111 28px,#000 28px,#000 34px);border-right:2px solid #222;}
.film-strip-right{right:0;background:repeating-linear-gradient(180deg,#111 0px,#111 28px,#000 28px,#000 34px);border-left:2px solid #222;}
.projector-ray{position:absolute;top:0;left:50%;transform:translateX(-50%);width:300px;height:60%;background:linear-gradient(180deg,rgba(255,250,230,.025) 0%,transparent 100%);clip-path:polygon(35% 0%, 65% 0%, 100% 100%, 0% 100%);pointer-events:none;}

.login-wrap{width:100%;max-width:380px;padding:0 20px;position:relative;z-index:1}
.login-logo{font-size:42px;font-weight:800;text-align:center;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2px}
.login-sub{font-size:10px;color:var(--mut);letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;text-align:center}
.card{background:rgba(15,19,24,.95);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:28px;box-shadow:0 24px 60px rgba(0,0,0,.6);}
.inp{width:100%;background:var(--s2);border:1px solid var(--brd);border-radius:8px;padding:12px;color:var(--txt);margin-bottom:12px;outline:none}
.btn-connect{width:100%;background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:8px;padding:14px;color:#000;font-weight:700;cursor:pointer}

/* PLAYER */
#sc-main{display:none;width:100vw;height:100vh;background:#000;position:fixed;inset:0;z-index:99}
video{width:100%;height:100%}
#status{color:var(--mut);font-size:11px;margin-top:10px;text-align:center;text-transform:uppercase;letter-spacing:1px}
</style>
</head>
<body>

<div id="sc-login">
    <div class="film-strip film-strip-left"></div>
    <div class="film-strip film-strip-right"></div>
    <div class="projector-ray"></div>
    <div class="login-wrap">
        <div class="login-logo">MousePlay</div>
        <div class="login-sub">Cinema Experience</div>
        <div class="card">
            <input type="text" id="dns" class="inp" placeholder="Servidor (DNS)" value="http://mundoma.top">
            <input type="text" id="user" class="inp" placeholder="Usuário">
            <input type="password" id="pass" class="inp" placeholder="Senha">
            <button class="btn-connect" onclick="conectar()">ENTRAR</button>
            <div id="status">SISTEMA PRONTO</div>
        </div>
    </div>
</div>

<div id="sc-main">
    <video id="video" controls autoplay playsinline></video>
</div>

<script>
function conectar() {
    let dns = document.getElementById('dns').value.trim();
    const user = document.getElementById('user').value.trim();
    const pass = document.getElementById('pass').value.trim();
    const status = document.getElementById('status');

    if (!dns || !user || !pass) {
        status.innerText = "PREENCHA TUDO!";
        return;
    }

    // Limpeza de DNS rápida
    if (!dns.startsWith('http')) dns = 'http://' + dns;
    dns = dns.replace(/\/$/, "");

    status.innerText = "CONECTANDO...";

    // Usando Proxy AllOrigins (o mais rápido para IPTV)
    const streamUrl = `https://api.allorigins.win{encodeURIComponent(dns + '/live/' + user + '/' + pass + '/1.m3u8')}`;

    document.getElementById('sc-login').style.display = 'none';
    document.getElementById('sc-main').style.display = 'block';

    iniciarPlayer(streamUrl);
}

function iniciarPlayer(url) {
    const video = document.getElementById('video');
    // Se o Hls ainda não carregou, ele tenta usar o player nativo do navegador
    if (window.Hls && Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    } else {
        video.src = url; // Fallback para Safari/iOS
    }
}
</script>
</body>
</html>
